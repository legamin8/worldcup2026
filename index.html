<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 — Live Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════
   THEME TOKENS
════════════════════════════════════════ */
:root {
  --gold:#f5c842; --gold2:#e6a800; --red:#e63946; --green:#22c55e;
  --blue:#3b82f6; --purple:#8b5cf6; --orange:#f97316;
}
[data-theme="dark"] {
  --bg:#080d1a; --bg2:#0d1425; --surface:#111827; --surface2:#1a2235;
  --surface3:#212d42; --border:#1e2d45; --border2:#253347;
  --text:#e8eaf0; --text2:#a0aec0; --muted:#5a6a85;
  --card-hover:rgba(245,200,66,.06); --shadow:0 4px 24px rgba(0,0,0,.5);
}
[data-theme="light"] {
  --bg:#f0f4f8; --bg2:#e2e8f0; --surface:#ffffff; --surface2:#f7f9fc;
  --surface3:#edf2f7; --border:#d1dbe8; --border2:#c5d0df;
  --text:#0f172a; --text2:#475569; --muted:#94a3b8;
  --card-hover:rgba(59,130,246,.04); --shadow:0 4px 24px rgba(0,0,0,.08);
}

/* ════════════════════════════════════════
   RESET & BASE
════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s;}

/* ════════════════════════════════════════
   HEADER
════════════════════════════════════════ */
.header{
  background:linear-gradient(135deg,var(--bg) 0%,var(--bg2) 50%,var(--bg) 100%);
  border-bottom:2px solid var(--gold);
  padding:14px 20px 12px;
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100;
  backdrop-filter:blur(20px);
}
[data-theme="dark"] .header{background:linear-gradient(135deg,rgba(8,13,26,.95) 0%,rgba(13,20,37,.95) 50%,rgba(8,13,26,.95) 100%);}
[data-theme="light"] .header{background:rgba(255,255,255,.95);}
.header-left{display:flex;align-items:center;gap:12px;}
.trophy-icon{
  width:40px;height:40px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:20px;box-shadow:0 0 20px rgba(245,200,66,.4);flex-shrink:0;
}
.header-title .eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}
.header-title h1{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:var(--text);line-height:1;}
.header-right{display:flex;align-items:center;gap:8px;}
.live-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(230,57,70,.15);border:1px solid rgba(230,57,70,.4);color:var(--red);font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:2px;padding:3px 8px;border-radius:20px;text-transform:uppercase;}
.live-dot{width:5px;height:5px;background:var(--red);border-radius:50%;animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.updated{color:var(--muted);font-size:10px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;}
.icon-btn{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text2);width:34px;height:34px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;transition:all .2s;flex-shrink:0;
}
.icon-btn:hover{background:var(--surface3);border-color:var(--border2);color:var(--text);}

/* ════════════════════════════════════════
   NAV
════════════════════════════════════════ */
.nav{
  display:flex;background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 16px;overflow-x:auto;scrollbar-width:none;position:sticky;top:68px;z-index:99;
}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);
  background:none;border:none;padding:12px 14px;cursor:pointer;
  border-bottom:2px solid transparent;transition:all .2s;
  margin-bottom:-1px;white-space:nowrap;flex-shrink:0;
}
.nav-btn.active,.nav-btn:hover{color:var(--gold);border-bottom-color:var(--gold);}

/* ════════════════════════════════════════
   CONTENT
════════════════════════════════════════ */
.content{padding:16px;max-width:1400px;margin:0 auto;}
.section{display:none;}
.section.active{display:block;}

/* ════════════════════════════════════════
   SKELETON
════════════════════════════════════════ */
.skel{background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-h{height:80px;margin-bottom:12px;}
.loading-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.error-box{background:rgba(230,57,70,.08);border:1px solid rgba(230,57,70,.3);border-radius:10px;padding:20px;text-align:center;font-family:'Barlow Condensed',sans-serif;color:var(--red);letter-spacing:.5px;}

/* ════════════════════════════════════════
   LEGEND
════════════════════════════════════════ */
.legend{display:flex;gap:16px;margin-bottom:16px;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:5px;}
.ldot{width:3px;height:12px;border-radius:2px;}
.ldot.q1{background:var(--gold);}
.ldot.q2{background:var(--blue);}

/* ════════════════════════════════════════
   STANDINGS — 3-col grid
════════════════════════════════════════ */
.groups-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.group-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;
  box-shadow:var(--shadow);transition:border-color .2s,transform .2s;
}
.group-card:hover{border-color:var(--border2);transform:translateY(-2px);}
.group-card-hdr{
  background:linear-gradient(135deg,var(--surface2),var(--bg2));
  border-bottom:1px solid var(--border);padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;
}
.group-lbl{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold);}
.col-hdrs{display:flex;gap:10px;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.col-hdrs span{width:20px;text-align:center;}
.team-row{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);gap:8px;transition:background .15s;cursor:pointer;}
.team-row:last-child{border-bottom:none;}
.team-row:hover{background:var(--card-hover);}
.team-rank{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--muted);width:14px;text-align:center;flex-shrink:0;}
.rank-1 .team-rank{color:var(--gold);}
.rank-2 .team-rank{color:#94a3b8;}
.qbar{width:3px;height:28px;border-radius:2px;flex-shrink:0;}
.rank-1 .qbar{background:var(--gold);}
.rank-2 .qbar{background:var(--blue);}
.rank-3 .qbar,.rank-4 .qbar{background:transparent;border:1px solid var(--border);}
.team-crest{width:22px;height:22px;object-fit:contain;flex-shrink:0;}
.team-crest-ph{width:22px;height:22px;font-size:16px;text-align:center;flex-shrink:0;}
.team-name{flex:1;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.team-stats{display:flex;gap:10px;flex-shrink:0;}
.st{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--muted);width:20px;text-align:center;}
.st.pts{font-weight:700;color:var(--text);font-size:13px;}
.conf-badge{font-family:'Barlow Condensed',sans-serif;font-size:8px;letter-spacing:1px;color:var(--green);background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);padding:1px 5px;border-radius:10px;flex-shrink:0;}

/* ACCORDION */
.accordion{border-top:1px solid var(--border);}
.acc-toggle{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;cursor:pointer;transition:background .15s;user-select:none;}
.acc-toggle:hover{background:var(--card-hover);}
.acc-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:6px;}
.mpill{background:rgba(245,200,66,.12);color:var(--gold);border-radius:10px;padding:1px 7px;font-size:9px;}
.acc-chev{font-size:9px;color:var(--muted);transition:transform .25s;}
.acc-chev.open{transform:rotate(180deg);}
.acc-body{display:none;}
.acc-body.open{display:block;}
.match-row{display:flex;align-items:center;padding:7px 14px;border-bottom:1px solid var(--border);gap:6px;font-family:'Barlow Condensed',sans-serif;font-size:11px;cursor:pointer;transition:background .15s;}
.match-row:last-child{border-bottom:none;}
.match-row:hover{background:var(--card-hover);}
.match-date{color:var(--muted);font-size:9px;width:56px;flex-shrink:0;line-height:1.3;}
.match-teams{flex:1;display:flex;align-items:center;gap:5px;}
.mtn{font-size:11px;font-weight:600;text-transform:uppercase;}
.mvs{color:var(--muted);font-size:9px;}
.mscore{font-weight:700;font-size:12px;color:var(--text);background:var(--surface2);padding:2px 7px;border-radius:6px;border:1px solid var(--border);flex-shrink:0;min-width:36px;text-align:center;}
.mscore.up{color:var(--muted);font-size:9px;}
.mst{font-size:9px;color:var(--muted);width:20px;text-align:right;flex-shrink:0;}
.mst.live{color:var(--red);animation:blink 1s infinite;}

/* ════════════════════════════════════════
   CALENDAR + FIXTURES
════════════════════════════════════════ */
.cal-strip{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;margin-bottom:16px;
  box-shadow:var(--shadow);
}
.cal-month{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--text);margin-bottom:10px;}
.cal-days{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.cal-days::-webkit-scrollbar{display:none;}
.cal-day{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:8px 12px;border-radius:10px;cursor:pointer;flex-shrink:0;
  border:1px solid transparent;transition:all .2s;min-width:52px;
}
.cal-day:hover{background:var(--surface2);border-color:var(--border);}
.cal-day.active{background:var(--gold);border-color:var(--gold);}
.cal-day.active .cal-dow,.cal-day.active .cal-num,.cal-day.active .cal-dot{color:#000;}
.cal-day.has-games .cal-dot{background:var(--gold);}
.cal-day.active.has-games .cal-dot{background:#000;}
.cal-dow{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.cal-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--text);line-height:1;}
.cal-dot{width:4px;height:4px;border-radius:50%;background:transparent;transition:background .2s;}

.fixtures-wrap{max-width:700px;margin:0 auto;}
.day-hdr{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--gold);padding:10px 0 8px;border-bottom:1px solid var(--border);margin-bottom:10px;display:flex;align-items:baseline;gap:10px;}
.day-count{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--muted);letter-spacing:1px;}

.fx-card{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  margin-bottom:10px;overflow:hidden;cursor:pointer;
  transition:border-color .2s,box-shadow .2s,transform .15s;
  box-shadow:var(--shadow);
}
.fx-card:hover{border-color:rgba(245,200,66,.4);box-shadow:0 8px 30px rgba(245,200,66,.08);transform:translateY(-1px);}
.fx-card.live-card{border-color:var(--red);animation:livePulse 2s infinite;}
@keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(230,57,70,.3)}50%{box-shadow:0 0 0 6px rgba(230,57,70,.0)}}
.fx-inner{display:flex;align-items:center;padding:14px 18px;gap:14px;}
.fx-time{font-family:'Barlow Condensed',sans-serif;width:56px;flex-shrink:0;text-align:center;}
.fx-time .tv{font-size:16px;color:var(--text);display:block;font-weight:700;}
.fx-time .td{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.fx-time .tlive{font-size:10px;color:var(--red);letter-spacing:1px;animation:blink 1s infinite;display:block;}
.fx-div{width:1px;height:40px;background:var(--border);flex-shrink:0;}
.fx-teams{flex:1;display:flex;align-items:center;gap:12px;}
.fx-team{display:flex;align-items:center;gap:8px;flex:1;}
.fx-team.away{flex-direction:row-reverse;text-align:right;}
.fx-flag{font-size:26px;flex-shrink:0;}
.fx-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;color:var(--text);}
.fx-abbr{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--muted);display:none;}
.fx-score-box{text-align:center;flex-shrink:0;width:72px;}
.fx-score{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--text);line-height:1;}
.fx-score.vs{font-size:13px;color:var(--muted);letter-spacing:1px;font-family:'Barlow Condensed',sans-serif;font-weight:700;}
.fx-badge{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-top:3px;}
.fx-badge.ft{color:var(--muted);}
.fx-badge.upcoming{color:var(--blue);}
.fx-badge.live{color:var(--red);animation:blink 1s infinite;}
.fx-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.fx-gtag{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);background:rgba(245,200,66,.1);padding:3px 8px;border-radius:20px;}
.fx-stag{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--purple);background:rgba(139,92,246,.1);padding:3px 7px;border-radius:20px;}
.fx-hint{font-family:'Barlow Condensed',sans-serif;font-size:9px;color:var(--muted);}

/* ════════════════════════════════════════
   BRACKET — Mirrored dual-side layout
════════════════════════════════════════ */
.bracket-outer{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:4px 0 16px;}
.bracket-grid{
  display:grid;
  grid-template-columns:
    /* left side: groups + R32 + R16 + QF + SF */
    repeat(4,140px)
    /* center: SF + Final + trophy */
    100px 140px 100px
    /* right side: SF + QF + R16 + R32 + groups */
    repeat(4,140px);
  grid-template-rows:auto;
  min-width:1500px;
  column-gap:0;
  align-items:start;
}

/* Column headers row */
.bg-hdr-row{
  grid-column:1/-1;
  display:grid;
  grid-template-columns:inherit;
  column-gap:0;
  margin-bottom:8px;
}
.bg-hdr{
  font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--gold);
  text-align:center;padding:7px 4px;
  background:linear-gradient(135deg,var(--surface2),var(--bg2));
  border-top:2px solid var(--gold);border-bottom:1px solid var(--border);
  white-space:nowrap;
}
.bg-hdr.center-hdr{border-top-color:var(--gold2);}
.bg-hdr.dim{color:var(--muted);border-top-color:var(--border);}

/* Column slot containers */
.b-col{display:flex;flex-direction:column;position:relative;}

/* Group mini-card on the sides */
.grp-card{
  margin:2px 3px;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:6px 8px;font-family:'Barlow Condensed',sans-serif;
  transition:border-color .2s;
}
.grp-card:hover{border-color:var(--border2);}
.grp-card-lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:4px;}
.grp-team{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;text-transform:uppercase;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.grp-team:last-child{border-bottom:none;}
.grp-pos-num{font-family:'Bebas Neue',sans-serif;font-size:11px;width:10px;text-align:center;flex-shrink:0;color:var(--muted);}
.grp-team.pos-1 .grp-pos-num{color:var(--gold);}
.grp-team.pos-2 .grp-pos-num{color:#94a3b8;}
.grp-team.pos-3 .grp-pos-num{color:var(--muted);}
.grp-team .gf{font-size:12px;flex-shrink:0;}
.grp-tname{flex:1;color:var(--text);font-size:10px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.grp-team.pos-1 .grp-tname{color:var(--gold);}
.grp-team.pos-2 .grp-tname{color:var(--text);}
.grp-team.pos-3 .grp-tname{color:var(--text2);}
.grp-pts{font-family:'Bebas Neue',sans-serif;font-size:11px;color:var(--muted);flex-shrink:0;}
/* Spacer between group mini-cards in the group col */
.grp-spacer{min-height:6px;}

/* Match card */
.b-match{
  margin:2px 5px;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;overflow:hidden;position:relative;transition:border-color .2s,box-shadow .2s;
}
.b-match:hover{border-color:rgba(245,200,66,.35);box-shadow:0 2px 12px rgba(0,0,0,.3);}
.b-match.gold-card{border-color:rgba(245,200,66,.5);box-shadow:0 0 16px rgba(245,200,66,.15);}
.b-match.gold-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(var(--gold),var(--gold2));}
/* right-side matches: accent on right */
.b-match.right-accent::after{content:'';position:absolute;right:0;top:0;bottom:0;width:3px;background:linear-gradient(var(--gold),var(--gold2));}

.b-team{
  display:flex;align-items:center;gap:5px;
  padding:6px 8px 6px 12px;
  font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;
  text-transform:uppercase;border-bottom:1px solid var(--border);min-height:29px;
}
.b-team:last-child{border-bottom:none;}
.b-team.conf{color:var(--text);}
.b-team.tbd{color:var(--muted);font-size:9px;opacity:.5;font-style:italic;}
.b-team.right-team{flex-direction:row-reverse;padding:6px 12px 6px 8px;text-align:right;}
.b-team .bf{font-size:12px;flex-shrink:0;}
.b-lbl{font-family:'Barlow Condensed',sans-serif;font-size:7px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-align:center;padding:2px;background:var(--surface2);border-top:1px solid var(--border);}

/* spacer within a column */
.b-spacer{flex-shrink:0;}

/* center trophy column */
.b-center{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 4px;
}
.b-trophy-icon{width:72px;height:72px;object-fit:contain;filter:drop-shadow(0 0 20px rgba(245,200,66,.5));animation:float 3s ease-in-out infinite;display:block;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.b-trophy-lbl{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;color:var(--gold);text-align:center;margin-top:6px;}

/* Final match slot (center) */
.b-final-wrap{display:flex;flex-direction:column;gap:6px;padding:4px;}
.b-final-title{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);text-align:center;padding:4px 0;}
.b-3rd-title{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--green);text-align:center;padding:4px 0;margin-top:12px;}

/* ════════════════════════════════════════
   LEADERBOARD — Top Scorers
════════════════════════════════════════ */
.lb-hero{margin-bottom:28px;}
.lb-hero-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.lb-hero-title span{color:var(--gold);}

/* stat cards row */
.lb-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.lb-stat-card{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:16px 18px;position:relative;overflow:hidden;box-shadow:var(--shadow);
}
.lb-stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.lb-stat-card.gc::after{background:linear-gradient(90deg,var(--gold),var(--gold2));}
.lb-stat-card.tc::after{background:linear-gradient(90deg,var(--blue),#60a5fa);}
.lb-stat-card.ac::after{background:linear-gradient(90deg,var(--purple),#a78bfa);}
.lb-stat-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.lb-stat-val{font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;}
.gc .lb-stat-val{color:var(--gold);}
.tc .lb-stat-val{color:var(--blue);font-size:24px;margin-top:4px;}
.ac .lb-stat-val{color:var(--purple);}
.lb-stat-sub{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--muted);margin-top:2px;}

/* podium top 3 */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:12px;margin-bottom:24px;}
.podium-slot{display:flex;flex-direction:column;align-items:center;gap:0;flex:1;max-width:180px;}
.podium-slot.p1{order:2;}
.podium-slot.p2{order:1;}
.podium-slot.p3{order:3;}
.podium-photo-wrap{position:relative;margin-bottom:0;}
.podium-photo{
  width:72px;height:72px;border-radius:50%;object-fit:cover;
  border:3px solid var(--border);background:var(--surface2);
  display:block;
}
.podium-slot.p1 .podium-photo{width:88px;height:88px;border-color:var(--gold);box-shadow:0 0 20px rgba(245,200,66,.4);}
.podium-slot.p2 .podium-photo{border-color:#e5e7eb;box-shadow:0 0 12px rgba(229,231,235,.2);}
.podium-slot.p3 .podium-photo{border-color:#cd7f32;box-shadow:0 0 12px rgba(205,127,50,.2);}
.podium-ph{width:72px;height:72px;border-radius:50%;background:var(--surface2);border:3px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:28px;}
.podium-slot.p1 .podium-ph{width:88px;height:88px;border-color:var(--gold);}
.podium-rank-badge{
  font-family:'Bebas Neue',sans-serif;font-size:12px;
  width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  position:absolute;bottom:-4px;right:-4px;border:2px solid var(--surface);
}
.p1 .podium-rank-badge{background:var(--gold);color:#000;}
.p2 .podium-rank-badge{background:#e5e7eb;color:#000;}
.p3 .podium-rank-badge{background:#cd7f32;color:#fff;}
.podium-base{
  width:100%;border-radius:10px 10px 0 0;
  display:flex;flex-direction:column;align-items:center;padding:12px 8px 10px;margin-top:6px;
}
.p1 .podium-base{background:linear-gradient(135deg,rgba(245,200,66,.2),rgba(245,200,66,.05));border:1px solid rgba(245,200,66,.3);min-height:90px;}
.p2 .podium-base{background:linear-gradient(135deg,rgba(229,231,235,.1),rgba(229,231,235,.03));border:1px solid rgba(229,231,235,.2);min-height:70px;}
.p3 .podium-base{background:linear-gradient(135deg,rgba(205,127,50,.1),rgba(205,127,50,.03));border:1px solid rgba(205,127,50,.2);min-height:60px;}
.podium-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;color:var(--text);text-align:center;margin-top:4px;}
.podium-team{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--muted);text-align:center;}
.podium-goals{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold);line-height:1;margin-top:4px;}
.p2 .podium-goals,.p3 .podium-goals{font-size:22px;}
.podium-goals-lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}

/* leaderboard list */
.lb-list{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
.lb-list-hdr{display:flex;align-items:center;padding:8px 16px;background:var(--surface2);border-bottom:1px solid var(--border);gap:12px;}
.lb-hdr-col{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.lb-row{display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);gap:12px;transition:background .15s;}
.lb-row:last-child{border-bottom:none;}
.lb-row:hover{background:var(--card-hover);}
.lb-rank{font-family:'Bebas Neue',sans-serif;font-size:18px;width:28px;text-align:center;flex-shrink:0;color:var(--muted);}
.lb-rank.r1{color:var(--gold);}
.lb-rank.r2{color:#e5e7eb;}
.lb-rank.r3{color:#cd7f32;}
.lb-photo{width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid var(--border);background:var(--surface2);}
.lb-ph{width:38px;height:38px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;border:2px solid var(--border);}
.lb-info{flex:1;min-width:0;}
.lb-pname{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lb-pteam{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--muted);}
.lb-g{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);width:36px;text-align:center;flex-shrink:0;}
.lb-a{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--blue);width:30px;text-align:center;flex-shrink:0;}
.lb-p{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--red);width:30px;text-align:center;flex-shrink:0;}
.lb-extra{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--green);background:rgba(34,197,94,.1);padding:2px 6px;border-radius:10px;flex-shrink:0;white-space:nowrap;}
.active-wc{font-family:'Barlow Condensed',sans-serif;font-size:8px;letter-spacing:1px;color:var(--green);background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);padding:1px 5px;border-radius:10px;flex-shrink:0;}

/* alltime extra col */
.lb-years{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--muted);width:80px;text-align:right;flex-shrink:0;}

/* ════════════════════════════════════════
   SQUAD / PLAYER MODAL
════════════════════════════════════════ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(8px);}
.modal-overlay.hidden{display:none;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.5);}
.modal-hdr{
  background:linear-gradient(135deg,var(--bg2),var(--surface2));
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:2;
}
.modal-close{background:var(--surface3);border:1px solid var(--border);color:var(--text2);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.modal-close:hover{background:var(--border);color:var(--text);}
.modal-score-section{padding:20px;text-align:center;border-bottom:1px solid var(--border);}
.modal-teams-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:12px;}
.modal-team{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;}
.modal-team-flag{font-size:38px;}
.modal-team-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;color:var(--text);}
.modal-scoreline{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:4px;color:var(--text);line-height:1;}
.modal-scoreline.live{color:var(--red);}
.modal-match-info{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--muted);display:flex;justify-content:center;gap:16px;flex-wrap:wrap;}
.modal-body{padding:16px 20px;}
.modal-sec-title{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.ev-item{display:flex;align-items:center;gap:8px;font-family:'Barlow Condensed',sans-serif;font-size:12px;margin-bottom:6px;}
.ev-item.away{flex-direction:row-reverse;}
.ev-min{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:2px 6px;font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0;min-width:32px;text-align:center;}
.lineup-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.lp{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--text);padding:3px 0;border-bottom:1px solid var(--border);display:flex;gap:6px;}
.lp:last-child{border-bottom:none;}
.lnum{color:var(--muted);width:20px;text-align:right;flex-shrink:0;}
.modal-pw{padding:12px;background:rgba(139,92,246,.05);border:1px solid rgba(139,92,246,.2);border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--muted);text-align:center;margin-bottom:12px;}
.modal-pw a{color:var(--purple);}
.modal-loading{padding:40px;text-align:center;font-family:'Barlow Condensed',sans-serif;color:var(--muted);letter-spacing:1px;font-size:14px;}

/* Squad modal */
.squad-team-hdr{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,var(--bg2),var(--surface2));}
.squad-crest{width:56px;height:56px;object-fit:contain;}
.squad-team-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--text);}
.squad-team-nat{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--muted);}
.squad-section{padding:14px 20px;}
.squad-pos-title{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin:12px 0 8px;}
.squad-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;}
.player-card{
  background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  padding:10px;display:flex;flex-direction:column;align-items:center;gap:6px;
  transition:border-color .2s,transform .15s;text-align:center;
}
.player-card:hover{border-color:rgba(245,200,66,.3);transform:translateY(-2px);}
.player-card-photo{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid var(--border);background:var(--surface3);}
.player-card-ph{width:52px;height:52px;border-radius:50%;background:var(--surface3);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;}
.player-num{font-family:'Bebas Neue',sans-serif;font-size:10px;color:var(--muted);}
.player-name{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;color:var(--text);line-height:1.2;}
.player-pos{font-family:'Barlow Condensed',sans-serif;font-size:9px;color:var(--muted);letter-spacing:.5px;}
.player-goals-badge{background:rgba(245,200,66,.15);border:1px solid rgba(245,200,66,.3);color:var(--gold);font-family:'Barlow Condensed',sans-serif;font-size:10px;padding:1px 8px;border-radius:10px;}

/* ════════════════════════════════════════
   FOOTER
════════════════════════════════════════ */
.footer{text-align:center;padding:16px;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1px;color:var(--muted);border-top:1px solid var(--border);margin-top:16px;}

/* ════════════════════════════════════════
   RESPONSIVE
════════════════════════════════════════ */
@media(max-width:1024px){.groups-grid{grid-template-columns:repeat(2,1fr);}.lb-stats{grid-template-columns:repeat(2,1fr);}.loading-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:900px){.podium{gap:6px;}.podium-slot{max-width:140px;}.lb-a,.lb-p,.lb-years{display:none;}}
@media(max-width:640px){
  .header{padding:10px 14px;}.header-title h1{font-size:18px;}.trophy-icon{width:36px;height:36px;font-size:18px;}
  .nav-btn{padding:10px 10px;font-size:10px;}
  .content{padding:12px;}
  .groups-grid{grid-template-columns:1fr;}
  .lb-stats{grid-template-columns:1fr 1fr;}
  .fx-name{font-size:13px;}.fx-flag{font-size:22px;}
  .podium{flex-wrap:wrap;}.podium-slot{min-width:100px;}
  .squad-grid{grid-template-columns:repeat(3,1fr);}
  .modal-scoreline{font-size:36px;}.modal-team-flag{font-size:28px;}
  .lineup-grid{grid-template-columns:1fr;}
}
@media(max-width:420px){
  .groups-grid{grid-template-columns:1fr;}
  .header-right .updated{display:none;}
  .fx-name{display:none;}.fx-abbr{display:block;}
  .lb-stats{grid-template-columns:1fr;}
  .squad-grid{grid-template-columns:repeat(2,1fr);}
}
</style>

const FLAGS={MEX:'🇲🇽',KOR:'🇰🇷',CZE:'🇨🇿',RSA:'🇿🇦',CAN:'🇨🇦',SUI:'🇨🇭',BIH:'🇧🇦',QAT:'🇶🇦',BRA:'🇧🇷',MAR:'🇲🇦',SCO:'🏴󠁧󠁢󠁳󠁣󠁴󠁿',HTI:'🇭🇹',USA:'🇺🇸',AUS:'🇦🇺',PAR:'🇵🇾',TUR:'🇹🇷',GER:'🇩🇪',CIV:'🇨🇮',ECU:'🇪🇨',CUW:'🇨🇼',NED:'🇳🇱',JPN:'🇯🇵',SWE:'🇸🇪',TUN:'🇹🇳',EGY:'🇪🇬',IRN:'🇮🇷',BEL:'🇧🇪',NZL:'🇳🇿',ESP:'🇪🇸',URU:'🇺🇾',CPV:'🇨🇻',KSA:'🇸🇦',FRA:'🇫🇷',NOR:'🇳🇴',SEN:'🇸🇳',IRQ:'🇮🇶',ARG:'🇦🇷',AUT:'🇦🇹',DZA:'🇩🇿',JOR:'🇯🇴',COL:'🇨🇴',COD:'🇨🇩',POR:'🇵🇹',UZB:'🇺🇿',ENG:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',GHA:'🇬🇭',PAN:'🇵🇦',CRO:'🇭🇷'};
const NAMES={MEX:'Mexico',KOR:'Korea Rep.',CZE:'Czechia',RSA:'S. Africa',CAN:'Canada',SUI:'Switzerland',BIH:'Bosnia',QAT:'Qatar',BRA:'Brazil',MAR:'Morocco',SCO:'Scotland',HTI:'Haiti',USA:'USA',AUS:'Australia',PAR:'Paraguay',TUR:'Türkiye',GER:'Germany',CIV:'Ivory Coast',ECU:'Ecuador',CUW:'Curaçao',NED:'Netherlands',JPN:'Japan',SWE:'Sweden',TUN:'Tunisia',EGY:'Egypt',IRN:'Iran',BEL:'Belgium',NZL:'New Zealand',ESP:'Spain',URU:'Uruguay',CPV:'Cape Verde',KSA:'Saudi Arabia',FRA:'France',NOR:'Norway',SEN:'Senegal',IRQ:'Iraq',ARG:'Argentina',AUT:'Austria',DZA:'Algeria',JOR:'Jordan',COL:'Colombia',COD:'Congo DR',POR:'Portugal',UZB:'Uzbekistan',ENG:'England',GHA:'Ghana',PAN:'Panama',CRO:'Croatia'};
const POS_ORDER=['Goalkeeper','Defender','Midfielder','Attacker'];

let STATE={standings:[],matches:[],scorers:[],teams:[],lastUpdated:null};
let ACTIVE_CAL_DATE=null;

/* ════════════ THEME ════════════ */
function initTheme(){
  const saved=localStorage.getItem('wc-theme')||'dark';
  document.documentElement.setAttribute('data-theme',saved);
  document.getElementById('theme-btn').textContent=saved==='dark'?'🌙':'☀️';
}
function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme');
  const next=cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  document.getElementById('theme-btn').textContent=next==='dark'?'🌙':'☀️';
  localStorage.setItem('wc-theme',next);
}

/* ════════════ DATA ════════════ */
async function loadAll(){
  try{
    showLoading();
    const [main,sc]=await Promise.all([
      fetch('/api/data').then(r=>r.json()),
      fetch('/api/data?type=scorers').then(r=>r.json()),
    ]);
    if(main.error) throw new Error(main.error);
    STATE.standings=main.standings||[];
    STATE.matches=main.matches||[];
    STATE.scorers=sc.scorers||[];
    STATE.teams=main.teams||[];
    STATE.lastUpdated=new Date();
    updateTs();
    renderAll();
  }catch(e){
    document.getElementById('groups-content').innerHTML=
      `<div class="error-box">⚠️ ${e.message}<br><br><button class="icon-btn" style="margin:12px auto;display:flex" onclick="loadAll()">↻ Retry</button></div>`;
  }
}
function showLoading(){
  document.getElementById('groups-content').innerHTML=
    `<div class="loading-grid">${Array(9).fill('<div class="skel skel-h"></div>').join('')}</div>`;
}
function updateTs(){
  if(!STATE.lastUpdated)return;
  const t=STATE.lastUpdated.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('last-updated').textContent=`Updated ${t}`;
  document.getElementById('footer-txt').textContent=
    `FIFA World Cup 2026 · Updated ${STATE.lastUpdated.toLocaleString()} · football-data.org`;
}

/* ════════════ HELPERS ════════════ */
const tla=t=>t?.tla||t?.shortName||'';
const flag=a=>FLAGS[a]||'🏳️';
const fname=a=>NAMES[a]||a;

// Robust flag lookup: tries tla first, then searches NAMES by team name
function teamFlag(team){
  if(!team) return '🏳️';
  // Try direct tla match
  if(team.tla && FLAGS[team.tla]) return FLAGS[team.tla];
  // Try shortName as key
  if(team.shortName && FLAGS[team.shortName]) return FLAGS[team.shortName];
  // Try matching team name against NAMES values
  const fullName = team.name||'';
  const shortName = team.shortName||'';
  for(const [abbr, name] of Object.entries(NAMES)){
    if(name===fullName||name===shortName||fullName.includes(name)||shortName.includes(name)){
      return FLAGS[abbr]||'🏳️';
    }
  }
  return '🏳️';
}
// Same but returns the abbreviation
function teamAbbr(team){
  if(!team) return '';
  if(team.tla && FLAGS[team.tla]) return team.tla;
  if(team.shortName && FLAGS[team.shortName]) return team.shortName;
  const fullName = team.name||'';
  const shortName = team.shortName||'';
  for(const [abbr, name] of Object.entries(NAMES)){
    if(name===fullName||name===shortName||fullName.includes(name)||shortName.includes(name)){
      return abbr;
    }
  }
  return team.tla||team.shortName||'';
}
function shortDate(u){return new Date(u).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',timeZone:'Africa/Kigali'});}
function catTime(u){return new Date(u).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'Africa/Kigali'});}
function longDate(u){return new Date(u).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',timeZone:'Africa/Kigali'});}
function dayKey(u){return new Date(u).toLocaleDateString('en-CA',{timeZone:'Africa/Kigali'});} // YYYY-MM-DD

function groupsByStage(s){
  const g={};
  s.forEach(entry=>{
    if(entry.type!=='TOTAL'||!entry.group)return;
    // API returns either "GROUP_A" or "Group A" — normalise both to single letter
    const raw = entry.group;
    const letter = raw.replace('GROUP_','').replace('Group ','').trim();
    g[letter]=entry.table;
  });
  return g;
}
function isConfirmed(table){
  const wm=table.map(t=>({...t,maxPts:t.points+(3-t.playedGames)*3}));
  const sorted=[...wm].sort((a,b)=>b.points-a.points);
  const thirdMax=sorted[2]?.maxPts??0;
  const r={};
  sorted.forEach(t=>{
    const key=teamAbbr(t.team)||tla(t.team);
    r[key]=t.points>thirdMax;
  });
  return r;
}

/* ════════════ RENDER ALL ════════════ */
function renderAll(){
  const groups=groupsByStage(STATE.standings);
  renderGroups(groups);
  renderCal();
  renderFixtures(null);
  renderBracket(groups);
  renderScorers();
  renderAlltime();
}

/* ════════════════════════════════════════
   STANDINGS
════════════════════════════════════════ */
function renderGroups(groups){
  const el=document.getElementById('groups-content');
  const gm={};
  STATE.matches.forEach(m=>{if(!m.group)return;const l=m.group.replace('GROUP_','');if(!gm[l])gm[l]=[];gm[l].push(m);});
  const letters=Object.keys(groups).sort();
  let html=`<div class="legend"><div class="legend-item"><div class="ldot q1"></div>1st — Advances</div><div class="legend-item"><div class="ldot q2"></div>2nd — Advances</div></div><div class="groups-grid">`;

  letters.forEach(letter=>{
    const table=groups[letter];
    const conf=isConfirmed(table);
    const matches=(gm[letter]||[]).sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate));
    const upcoming=matches.filter(m=>m.status!=='FINISHED').length;
    const played=matches.filter(m=>m.status==='FINISHED').length;
    const pill=upcoming>0?`${upcoming} upcoming`:`${played} played`;

    const teamRows=table.map((row,i)=>{
      const a=teamAbbr(row.team)||tla(row.team);
      const fl=teamFlag(row.team);
      const isConf=conf[a]&&i<2;
      const crest=row.team.crest?`<img class="team-crest" src="${row.team.crest}" alt="" onerror="this.outerHTML='<span class=team-crest-ph>${fl}</span>'">`:`<span class="team-crest-ph">${fl}</span>`;
      return `<div class="team-row rank-${i+1}" onclick="openSquad(${row.team.id},'${row.team.name}','${row.team.crest||''}')">
        <div class="team-rank">${i+1}</div>
        <div class="qbar"></div>
        ${crest}
        <div class="team-name">${row.team.shortName||row.team.name}</div>
        ${isConf?'<div class="conf-badge">✓ QF</div>':''}
        <div class="team-stats">
          <span class="st">${row.won}</span><span class="st">${row.draw}</span>
          <span class="st">${row.lost}</span><span class="st pts">${row.points}</span>
        </div>
      </div>`;
    }).join('');

    const matchRows=matches.map(m=>{
      const ht=tla(m.homeTeam),at=tla(m.awayTeam);
      const isLive=m.status==='IN_PLAY'||m.status==='PAUSED';
      const isFin=m.status==='FINISHED';
      const score=isFin||isLive?`${m.score?.fullTime?.home??'?'}–${m.score?.fullTime?.away??'?'}`:catTime(m.utcDate);
      return `<div class="match-row" onclick="openMatch(${m.id})">
        <div class="match-date">${shortDate(m.utcDate).replace(',',' ')}</div>
        <div class="match-teams"><span class="mtn">${ht}</span><span class="mvs">vs</span><span class="mtn">${at}</span></div>
        <div class="mscore ${isFin||isLive?'':'up'}">${score}</div>
        <div class="mst ${isLive?'live':''}">${isFin?'FT':isLive?'●':''}</div>
      </div>`;
    }).join('');

    html+=`<div class="group-card">
      <div class="group-card-hdr"><div class="group-lbl">Group ${letter}</div><div class="col-hdrs"><span>W</span><span>D</span><span>L</span><span>Pts</span></div></div>
      ${teamRows}
      <div class="accordion">
        <div class="acc-toggle" onclick="toggleAcc(this)">
          <div class="acc-label">Matches <span class="mpill">${pill}</span></div>
          <span class="acc-chev">▼</span>
        </div>
        <div class="acc-body">${matchRows}</div>
      </div>
    </div>`;
  });
  html+='</div>';
  el.innerHTML=html;
}
function toggleAcc(t){
  t.querySelector('.acc-chev').classList.toggle('open');
  t.nextElementSibling.classList.toggle('open');
}

/* ════════════════════════════════════════
   CALENDAR + FIXTURES
════════════════════════════════════════ */
function renderCal(){
  const el=document.getElementById('cal-wrap');
  const days={};
  STATE.matches.forEach(m=>{const k=dayKey(m.utcDate);if(!days[k])days[k]=[];days[k].push(m);});
  const sorted=Object.keys(days).sort();
  if(!sorted.length){el.innerHTML='';return;}

  const monthLabel=new Date(sorted[0]+'T12:00:00').toLocaleDateString('en-US',{month:'long',year:'numeric'});
  if(!ACTIVE_CAL_DATE) ACTIVE_CAL_DATE=sorted[0];

  const dayEls=sorted.map(k=>{
    const d=new Date(k+'T12:00:00');
    const dow=d.toLocaleDateString('en-US',{weekday:'short'});
    const num=d.getDate();
    const active=k===ACTIVE_CAL_DATE?'active':'';
    return `<div class="cal-day ${active} has-games" onclick="selectDay('${k}')" data-day="${k}">
      <span class="cal-dow">${dow}</span>
      <span class="cal-num">${num}</span>
      <span class="cal-dot"></span>
    </div>`;
  }).join('');

  el.innerHTML=`<div class="cal-strip">
    <div class="cal-month">📅 ${monthLabel}</div>
    <div class="cal-days">${dayEls}</div>
  </div>`;
}

function selectDay(k){
  ACTIVE_CAL_DATE=k;
  document.querySelectorAll('.cal-day').forEach(d=>{
    d.classList.toggle('active',d.dataset.day===k);
  });
  renderFixtures(k);
}

function renderFixtures(filterDay){
  const el=document.getElementById('fixtures-content');
  const sorted=[...STATE.matches].sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate));
  const byDay={};
  sorted.forEach(m=>{const k=dayKey(m.utcDate);if(!byDay[k])byDay[k]=[];byDay[k].push(m);});

  const days=filterDay?{[filterDay]:byDay[filterDay]||[]}:byDay;
  let html='<div class="fixtures-wrap">';

  Object.entries(days).forEach(([k,games])=>{
    if(!games.length)return;
    const dayLabel=longDate(k+'T12:00:00');
    html+=`<div class="upcoming-day">
      <div class="day-hdr">${dayLabel}<span class="day-count">${games.length} match${games.length>1?'es':''}</span></div>`;
    games.forEach(m=>{
      const ht=tla(m.homeTeam),at=tla(m.awayTeam);
      const isLive=m.status==='IN_PLAY'||m.status==='PAUSED';
      const isFin=m.status==='FINISHED';
      const grpL=m.group?m.group.replace('GROUP_',''):null;
      const stageMap={ROUND_OF_32:'R32',ROUND_OF_16:'R16',QUARTER_FINALS:'QF',SEMI_FINALS:'SF',FINAL:'Final','3RD_PLACE_PLAY_OFF':'3rd'};
      const stageTag=!grpL&&stageMap[m.stage]?`<div class="fx-stag">${stageMap[m.stage]}</div>`:'';
      const scoreHtml=isFin
        ?`<div class="fx-score">${m.score?.fullTime?.home??'?'}–${m.score?.fullTime?.away??'?'}</div><div class="fx-badge ft">FT</div>`
        :isLive
        ?`<div class="fx-score" style="color:var(--red)">${m.score?.fullTime?.home??0}–${m.score?.fullTime?.away??0}</div><div class="fx-badge live">● LIVE</div>`
        :`<div class="fx-score vs">VS</div><div class="fx-badge upcoming">${catTime(m.utcDate)}</div>`;
      html+=`<div class="fx-card ${isLive?'live-card':''}" onclick="openMatch(${m.id})">
        <div class="fx-inner">
          <div class="fx-time">
            ${isLive?`<span class="tlive">● LIVE</span>`:`<span class="tv">${catTime(m.utcDate)}</span>`}
            <span class="td">CAT</span>
          </div>
          <div class="fx-div"></div>
          <div class="fx-teams">
            <div class="fx-team home"><span class="fx-flag">${flag(ht)}</span><span class="fx-name">${fname(ht)}</span><span class="fx-abbr">${ht}</span></div>
            <div class="fx-score-box">${scoreHtml}</div>
            <div class="fx-team away"><span class="fx-flag">${flag(at)}</span><span class="fx-name">${fname(at)}</span><span class="fx-abbr">${at}</span></div>
          </div>
          <div class="fx-meta">
            ${grpL?`<div class="fx-gtag">Grp ${grpL}</div>`:stageTag}
            <div class="fx-hint">tap for stats</div>
          </div>
        </div>
      </div>`;
    });
    html+='</div>';
  });
  html+='</div>';
  el.innerHTML=html||'<div class="fixtures-wrap"><div class="error-box">No matches for this date</div></div>';
}

/* ════════════════════════════════════════
   BRACKET — Mirrored dual-side
════════════════════════════════════════ */
function renderBracket(groups){
  const el=document.getElementById('bracket-content');

  // Build confirmed qualifier map
  const confirmed={};
  Object.entries(groups).forEach(([l,table])=>{
    const conf=isConfirmed(table);
    const sorted=[...table].sort((a,b)=>b.points-a.points);
    confirmed[l]={
      first:  conf[tla(sorted[0]?.team)]?sorted[0]:null,
      second: conf[tla(sorted[1]?.team)]?sorted[1]:null,
      teams:  sorted,
    };
  });

  function resolve(code){
    if(!code||code==='TBD'||code==='3rd') return{team:null,label:code==='3rd'?'Best 3rd':'TBD'};
    const pos=code[0],grp=code[1];
    if(!confirmed[grp]) return{team:null,label:code};
    const t=pos==='1'?confirmed[grp].first:confirmed[grp].second;
    return{team:t||null,label:`${pos==='1'?'1st':'2nd'} Grp ${grp}`};
  }

  function bTeam(r,isRight=false){
    const rtClass=isRight?'right-team':'';
    if(r.team){
      const fl=teamFlag(r.team.team);
      const nm=r.team.team?.shortName||r.team.team?.name||'';
      return`<div class="b-team conf ${rtClass}"><span class="bf">${fl}</span><span>${nm}</span></div>`;
    }
    return`<div class="b-team tbd ${rtClass}">${r.label}</div>`;
  }

  function bMatch(r1,r2,lbl,gold=false,isRight=false){
    const accent=isRight?'right-accent':'';
    return`<div class="b-match ${gold?'gold-card':''} ${accent}">
      ${bTeam(r1,isRight)}${bTeam(r2,isRight)}
      <div class="b-lbl">${lbl}</div>
    </div>`;
  }

  function tbdMatch(lbl,isRight=false){
    const accent=isRight?'right-accent':'';
    return`<div class="b-match ${accent}">
      <div class="b-team tbd ${isRight?'right-team':''}">TBD</div>
      <div class="b-team tbd ${isRight?'right-team':''}">TBD</div>
      <div class="b-lbl">${lbl}</div>
    </div>`;
  }

  // Group mini-card — shows current top 3 with live points
  // groups[letter] = array of standings rows: {team:{id,name,shortName,tla,crest}, points, won, draw, lost, playedGames}
  function grpCard(letter){
    // Pull directly from the raw groups object (sorted by API rank)
    const table = groups[letter] || [];
    // API already returns rows sorted by rank, but re-sort by points to be safe
    const sorted = [...table].sort((a,b) => {
      if(b.points !== a.points) return b.points - a.points;
      const gdA = (a.goalsFor||0) - (a.goalsAgainst||0);
      const gdB = (b.goalsFor||0) - (b.goalsAgainst||0);
      return gdB - gdA;
    });

    const rows = [];
    for(let pos=0;pos<3;pos++){
      const row = sorted[pos];
      if(!row || !row.team){
        rows.push(`<div class="grp-team pos-${pos+1}">
          <span class="grp-pos-num">${pos+1}</span>
          <span class="gf" style="opacity:.4">❓</span>
          <span class="grp-tname" style="opacity:.35">TBD</span>
        </div>`);
        continue;
      }
      // team object from football-data.org: {id, name, shortName, tla, crest}
      const team = row.team;
      const abbr = teamAbbr(team);
      const fl = teamFlag(team);
      const nm = team.shortName || team.name || abbr;
      const pts = row.points ?? 0;
      rows.push(`<div class="grp-team pos-${pos+1}">
        <span class="grp-pos-num">${pos+1}</span>
        <span class="gf">${fl}</span>
        <span class="grp-tname">${nm}</span>
        <span class="grp-pts">${pts}pt</span>
      </div>`);
    }
    return`<div class="grp-card">
      <div class="grp-card-lbl">Group ${letter}</div>
      ${rows.join('')}
    </div>`;
  }

  // ══ LEFT SIDE: Groups A-F feed M1-M8 ══
  // Official R32 pairings (left side: M1-M8)
  // M1:1A v 2B, M2:1C v 2D, M3:1E v 2F, M4:1G v 2H  → feeds left QF/SF
  // M5:2A v 1B, M6:2C v 1D, M7:2E v 1F, M8:2G v 1H  → feeds left QF/SF

  const S=72; // slot height px

  // LEFT GROUP COLUMN (A,B,C,D,E,F)
  const leftGrps=['A','B','C','D','E','F'];
  let leftGrpHtml='';
  leftGrps.forEach((l,i)=>{
    leftGrpHtml+=grpCard(l);
    if(i<leftGrps.length-1) leftGrpHtml+=`<div class="grp-spacer" style="height:${S*0.5}px"></div>`;
  });

  // LEFT R32: M1-M8 (pairs from left groups)
  const leftR32=[
    [resolve('1A'),resolve('2B'),'M1'],
    [resolve('1C'),resolve('2D'),'M2'],
    [resolve('1E'),resolve('2F'),'M3'],
    [resolve('1G'),resolve('2H'),'M4'],
    [resolve('2A'),resolve('1B'),'M5'],
    [resolve('2C'),resolve('1D'),'M6'],
    [resolve('2E'),resolve('1F'),'M7'],
    [resolve('2G'),resolve('1H'),'M8'],
  ];
  let leftR32Html='';
  leftR32.forEach(([t1,t2,lbl],i)=>{
    leftR32Html+=bMatch(t1,t2,lbl);
    if(i<7) leftR32Html+=`<div class="b-spacer" style="height:4px"></div>`;
  });

  // LEFT R16: 4 matches
  let leftR16Html='';
  for(let i=0;i<4;i++){
    leftR16Html+=tbdMatch(`R16 #${i+1}`);
    if(i<3) leftR16Html+=`<div class="b-spacer" style="height:${S*0.9}px"></div>`;
  }

  // LEFT QF: 2 matches
  let leftQFHtml='';
  [0,1].forEach(i=>{
    leftQFHtml+=tbdMatch(`QF ${i+1}`);
    if(i===0) leftQFHtml+=`<div class="b-spacer" style="height:${S*2.8}px"></div>`;
  });

  // LEFT SF: 1 match
  const leftSFHtml=tbdMatch('SF 1');

  // ══ RIGHT SIDE (mirrored): Groups G-L feed M9-M16 ══
  const rightGrps=['G','H','I','J','K','L'];
  let rightGrpHtml='';
  rightGrps.forEach((l,i)=>{
    rightGrpHtml+=grpCard(l);
    if(i<rightGrps.length-1) rightGrpHtml+=`<div class="grp-spacer" style="height:${S*0.5}px"></div>`;
  });

  const rightR32=[
    [resolve('1I'),resolve('2J'),'M9'],
    [resolve('1K'),resolve('2L'),'M10'],
    [resolve('3rd')  ,resolve('TBD'),'M11'],
    [resolve('3rd')  ,resolve('TBD'),'M12'],
    [resolve('2I'),resolve('1J'),'M13'],
    [resolve('2K'),resolve('1L'),'M14'],
    [resolve('3rd')  ,resolve('TBD'),'M15'],
    [resolve('3rd')  ,resolve('TBD'),'M16'],
  ];
  let rightR32Html='';
  rightR32.forEach(([t1,t2,lbl],i)=>{
    rightR32Html+=bMatch(t1,t2,lbl,false,true);
    if(i<7) rightR32Html+=`<div class="b-spacer" style="height:4px"></div>`;
  });

  let rightR16Html='';
  for(let i=0;i<4;i++){
    rightR16Html+=tbdMatch(`R16 #${i+5}`,true);

async function wikiPhoto(name){
  try{
    const r=await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(name)}&prop=pageimages&format=json&pithumbsize=300&origin=*`).then(r=>r.json());
    const page=Object.values(r?.query?.pages||{})[0];
    return page?.thumbnail?.source||null;
  }catch{return null;}
}

function podiumSlot(sc,rank,prefix){
  const name=sc.player?.name||sc.player||'Unknown';
  const team=sc.team?.shortName||sc.team?.name||sc.country||'';
  const natEntry=sc.player?.nationality?Object.entries(NAMES).find(([k,v])=>sc.player.nationality.includes(v)):null;
  const pFlag=natEntry?flag(natEntry[0]):(sc.flag||'🏳️');
  const goals=sc.goals;
  const cls=rank===1?'p1':rank===2?'p2':'p3';
  const id=`${prefix}-pod-${rank}`;
  // Queue photo load after render
  setTimeout(async()=>{
    const wk=sc.wiki||sc.player?.name||name;
    const url=await wikiPhoto(wk);
    const el=document.getElementById(id);
    if(el&&url) el.outerHTML=`<img class="podium-photo" src="${url}" alt="${name}" loading="lazy" onerror="this.style.display='none'">`;
  },50+rank*200);
  return`<div class="podium-slot ${cls}">
    <div class="podium-photo-wrap">
      <div class="podium-ph" id="${id}">${pFlag}</div>
      <div class="podium-rank-badge">${rank}</div>
    </div>
    <div class="podium-base">
      <div class="podium-name">${name.split(' ').slice(-1)[0]}</div>
      <div class="podium-team">${pFlag} ${team}</div>
      <div class="podium-goals">${goals}</div>
      <div class="podium-goals-lbl">Goals</div>
    </div>
  </div>`;
}

function lbRow(sc,i,prefix,extra=''){
  const name=sc.player?.name||sc.player||'Unknown';
  const team=sc.team?.shortName||sc.team?.name||sc.country||'';
  const pFlag=sc.player?.nationality?Object.entries(NAMES).find(([k,v])=>sc.player.nationality?.includes(v))?.[0]:'';
  const fl=pFlag?flag(pFlag):(sc.flag||'🏳️');
  const rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
  const wikiKey=sc.wiki||sc.player?.name||name;
  return`<div class="lb-row">
    <div class="lb-rank ${rc}">${sc.rank||i+1}</div>
    <div class="lb-ph" id="${prefix}-lbp-${i}">${fl}</div>
    <div class="lb-info">
      <div class="lb-pname">${name}${sc.active?` <span class="active-wc">● 2026</span>`:''}</div>
      <div class="lb-pteam">${fl} ${team}</div>
    </div>
    <div class="lb-g">${sc.goals||0}</div>
    <div class="lb-a">${sc.assists!=null?sc.assists:sc.wc2026!=null?`+${sc.wc2026}`:''}</div>
    <div class="lb-p">${sc.penalties||''}</div>
    ${extra}
  </div>`;
}

async function loadPhotosForPrefix(list,prefix,wikiField){
  // Fire all requests in parallel with staggered start
  list.forEach((sc,i)=>{
    const wk=sc[wikiField]||sc.player?.name||sc.player||'';
    if(!wk)return;
    setTimeout(async()=>{
      const url=await wikiPhoto(wk);
      if(!url)return;
      const lbEl=document.getElementById(`${prefix}-lbp-${i}`);
      if(lbEl) lbEl.outerHTML=`<img class="lb-photo" src="${url}" alt="${wk}" loading="lazy" onerror="this.style.display='none'">`;
    }, i*80);
  });
}

   MATCH MODAL — rich stats from API-Football
════════════════════════════════════════ */
async function openMatch(matchId){
  openModalWith('<div class="modal-loading">Loading match...</div>');
  try{
    // Load base match data (football-data.org)
    const m = await fetch(`/api/data?type=match&matchId=${matchId}`).then(r=>r.json());
    if(m.error) throw new Error(m.error);

    // Render basic shell immediately so user sees content fast
    renderMatchModal(m, null);

    // Then fetch rich stats from API-Football in background
    const isFin = m.status==='FINISHED';
    const isLive = m.status==='IN_PLAY'||m.status==='PAUSED';
    if(isFin||isLive){
      const date = m.utcDate?.slice(0,10) ?? '';
      const home = m.homeTeam?.name ?? '';
      const away = m.awayTeam?.name ?? '';
      try{
        const rich = await fetch(
          `/api/data?type=matchstats&date=${encodeURIComponent(date)}&home=${encodeURIComponent(home)}&away=${encodeURIComponent(away)}`
        ).then(r=>r.json());
        if(rich.found) renderMatchModal(m, rich);
      }catch(e){ /* rich stats failed — basic view stays */ }
    }
  }catch(e){
    document.getElementById('modal-inner').innerHTML=
      `<div style="padding:20px"><div class="error-box">${e.message}</div></div>`;
  }
}

function renderMatchModal(m, rich){
  const ht  = teamAbbr(m.homeTeam)||tla(m.homeTeam);
  const at  = teamAbbr(m.awayTeam)||tla(m.awayTeam);
  const htF = teamFlag(m.homeTeam);
  const atF = teamFlag(m.awayTeam);
  const isLive = m.status==='IN_PLAY'||m.status==='PAUSED';
  const isFin  = m.status==='FINISHED';
  const hs  = m.score?.fullTime?.home;
  const as_ = m.score?.fullTime?.away;
  const grpL = m.group ? m.group.replace('GROUP_','').replace('Group ','') : null;
  const stageMap = {GROUP_STAGE:'Group Stage',ROUND_OF_32:'Round of 32',ROUND_OF_16:'Round of 16',QUARTER_FINALS:'Quarter Finals',SEMI_FINALS:'Semi Finals',FINAL:'Final','3RD_PLACE_PLAY_OFF':'3rd Place'};

  // ── Goal events (from football-data.org)
  const goals  = m.goals||[];
  const hGoals = goals.filter(g=>g.team?.id===m.homeTeam?.id);
  const aGoals = goals.filter(g=>g.team?.id===m.awayTeam?.id);
  const fmtG   = (g,away)=>`<div class="ev-item ${away?'away':''}">
    <div class="ev-min">${g.minute}'</div>
    <span style="font-size:14px">${g.type==='OWN_GOAL'?'⚽OG':g.type==='PENALTY'?'⚽P':'⚽'}</span>
    <span style="font-family:Barlow Condensed;font-size:12px;color:var(--text)">${g.scorer?.name||'?'}${g.assist?.name?` <span style="color:var(--muted)">(${g.assist.name})</span>`:''}</span>
  </div>`;
  const evHtml = goals.length ? `
    <div class="modal-sec-title">Goals</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
      <div>${hGoals.map(g=>fmtG(g,false)).join('')||'<span style="color:var(--muted);font-family:Barlow Condensed;font-size:11px">—</span>'}</div>
      <div>${aGoals.map(g=>fmtG(g,true)).join('')||'<span style="color:var(--muted);font-family:Barlow Condensed;font-size:11px">—</span>'}</div>
    </div>` : '';

  // ── Rich stats block (from API-Football)
  let richHtml = '';
  if(rich?.found && rich.stats?.length){
    // stats = [{team:{id,name,logo}, statistics:[{type,value},...]}]
    const homeStats = rich.stats[0]?.statistics || [];
    const awayStats = rich.stats[1]?.statistics || [];
    const getStat   = (arr, type) => arr.find(s=>s.type===type)?.value ?? '–';

    const STAT_ROWS = [
      ['Ball Possession','Possession'],
      ['Total Shots','Shots'],
      ['Shots on Goal','On Target'],
      ['Shots off Goal','Off Target'],
      ['Blocked Shots','Blocked'],
      ['Corner Kicks','Corners'],
      ['Fouls','Fouls'],
      ['Yellow Cards','🟨'],
      ['Red Cards','🟥'],
      ['Goalkeeper Saves','Saves'],
      ['Offsides','Offsides'],
      ['Total passes','Passes'],
      ['Passes accurate','Pass Acc.'],
    ];

    const rows = STAT_ROWS.map(([apiKey, label])=>{
      const hv = getStat(homeStats, apiKey);
      const av = getStat(awayStats, apiKey);
      if(hv==='–'&&av==='–') return '';
      // Build percentage bar where both values are numbers or percentages
      const hNum = parseFloat(String(hv).replace('%',''));
      const aNum = parseFloat(String(av).replace('%',''));
      let barHtml = '';
      if(!isNaN(hNum)&&!isNaN(aNum)&&(hNum+aNum)>0){
        const hPct = Math.round(hNum/(hNum+aNum)*100);
        barHtml = `<div style="display:flex;height:3px;border-radius:2px;overflow:hidden;margin:4px 0;background:var(--border)">
          <div style="width:${hPct}%;background:var(--blue)"></div>
          <div style="width:${100-hPct}%;background:var(--purple)"></div>
        </div>`;
      }
      return `<div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">
        <div style="font-family:Bebas Neue;font-size:16px;color:var(--blue);text-align:right">${hv}</div>
        <div style="font-family:Barlow Condensed;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-align:center;white-space:nowrap">${label}</div>
        <div style="font-family:Bebas Neue;font-size:16px;color:var(--purple)">${av}</div>
      </div>${barHtml}`;
    }).filter(Boolean).join('');

    if(rows){
      richHtml += `<div class="modal-sec-title" style="margin-top:12px">Match Statistics</div>
        <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:4px;padding:4px 0;margin-bottom:4px">
          <div style="font-family:Barlow Condensed;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--blue);text-align:right">${m.homeTeam?.shortName||ht}</div>
          <div></div>
          <div style="font-family:Barlow Condensed;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--purple)">${m.awayTeam?.shortName||at}</div>
        </div>
        <div style="margin-bottom:16px">${rows}</div>`;
    }

    // ── Player ratings (top performers)
    if(rich.players?.length){
      const allPlayers = [];
      rich.players.forEach(teamData=>{
        const isHome = teamData.team.id === rich.stats[0]?.team?.id;
        (teamData.players||[]).forEach(p=>{
          const rating = parseFloat(p.statistics?.[0]?.games?.rating||0);
          if(rating>0) allPlayers.push({...p, isHome, rating});
        });
      });
      allPlayers.sort((a,b)=>b.rating-a.rating);
      const top6 = allPlayers.slice(0,6);
      if(top6.length){
        const playerCards = top6.map(p=>{
          const s = p.statistics?.[0] || {};
          const mins = s.games?.minutes||0;
          const goals = s.goals?.total||0;
          const assists = s.goals?.assists||0;
          const rating = p.rating.toFixed(1);
          const rColor = p.rating>=8?'var(--green)':p.rating>=7?'var(--gold)':'var(--muted)';
          return `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px;">
            <img src="${p.player?.photo||''}" alt="" style="width:34px;height:34px;border-radius:50%;object-fit:cover;background:var(--surface3)" onerror="this.style.display='none'">
            <div style="flex:1;min-width:0">
              <div style="font-family:Barlow Condensed;font-size:12px;font-weight:700;text-transform:uppercase;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.player?.name||'?'}</div>
              <div style="font-family:Barlow Condensed;font-size:10px;color:var(--muted)">${mins}' ${goals>0?`⚽${goals}`:''}${assists>0?` 🎯${assists}`:''}</div>
            </div>
            <div style="font-family:Bebas Neue;font-size:18px;color:${rColor}">${rating}</div>
          </div>`;
        }).join('');
        richHtml += `<div class="modal-sec-title">Top Performers</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:16px">${playerCards}</div>`;
      }
    }
  } else if(isFin && !rich){
    richHtml = `<div class="modal-pw" style="margin-top:8px">⏳ Loading detailed statistics...</div>`;
  } else if(isFin && rich && !rich.found){
    richHtml = `<div class="modal-pw" style="margin-top:8px">📊 Detailed stats will appear here once available from our stats provider.</div>`;
  }

  // ── Lineups (from football-data.org)
  const hL = m.homeTeam?.lineup||[];
  const aL = m.awayTeam?.lineup||[];
  const lineupHtml = (hL.length||aL.length) ? `
    <div class="modal-sec-title">Line-ups</div>
    <div class="lineup-grid">
      <div><div style="font-family:Barlow Condensed;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px">${m.homeTeam?.shortName||ht}${m.homeTeam?.formation?` (${m.homeTeam.formation})`:''}</div>
        ${hL.map(p=>`<div class="lp"><span class="lnum">${p.shirtNumber||''}</span>${p.name}</div>`).join('')}</div>
      <div><div style="font-family:Barlow Condensed;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px">${m.awayTeam?.shortName||at}${m.awayTeam?.formation?` (${m.awayTeam.formation})`:''}</div>
        ${aL.map(p=>`<div class="lp"><span class="lnum">${p.shirtNumber||''}</span>${p.name}</div>`).join('')}</div>
    </div>` : '';

  document.getElementById('modal-inner').innerHTML=`
    <div class="modal-hdr">
      <div>
        <div style="font-family:Barlow Condensed;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold)">${stageMap[m.stage]||m.stage||''} ${grpL?'· Group '+grpL:''}</div>
        <div style="font-family:Barlow Condensed;font-size:11px;color:var(--muted);margin-top:2px">${longDate(m.utcDate)} · ${catTime(m.utcDate)} CAT · ${m.venue||'TBD'}</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-score-section">
      <div class="modal-teams-row">
        <div class="modal-team"><div class="modal-team-flag">${htF}</div><div class="modal-team-name">${m.homeTeam?.name||fname(ht)}</div></div>
        <div>
          <div class="modal-scoreline ${isLive?'live':''}">${isFin||isLive?`${hs??'?'} – ${as_??'?'}`:'vs'}</div>
          <div style="font-family:Barlow Condensed;font-size:10px;letter-spacing:1px;text-align:center;color:${isFin?'var(--muted)':isLive?'var(--red)':'var(--blue)'}">
            ${isFin?'FULL TIME':isLive?`● LIVE ${m.minute?m.minute+"'":''}`:catTime(m.utcDate)+' CAT'}
          </div>
          ${m.score?.halfTime?.home!=null?`<div style="font-family:Barlow Condensed;font-size:10px;color:var(--muted);text-align:center;margin-top:4px">HT: ${m.score.halfTime.home}–${m.score.halfTime.away}</div>`:''}
        </div>
        <div class="modal-team"><div class="modal-team-flag">${atF}</div><div class="modal-team-name">${m.awayTeam?.name||fname(at)}</div></div>
      </div>
      ${m.attendance?`<div class="modal-match-info"><span>👥 ${m.attendance.toLocaleString()}</span></div>`:''}
    </div>
    <div class="modal-body">${evHtml}${richHtml}${lineupHtml}</div>`;
}

async function openSquad(fdTeamId, teamName, crestUrl){
  openModalWith(`<div class="modal-loading">Loading ${teamName} squad...</div>`);
  try{
    // Load squad from football-data.org (names, positions, shirt numbers)
    const squadData = await fetch(`/api/data?type=squad&teamId=${fdTeamId}`).then(r=>r.json());
    if(squadData.error) throw new Error(squadData.error);

    // Render immediately with basic info
    renderSquadModal(squadData, null);

    // Lookup the API-Football team ID for this team, then fetch player stats
    try{
      const afTeamsData = await fetch('/api/data?type=afteams').then(r=>r.json());
      const afTeam = (afTeamsData.response||[]).find(t=>
        t.team.name.toLowerCase().includes(teamName.toLowerCase().split(' ')[0]) ||
        teamName.toLowerCase().includes(t.team.name.toLowerCase().split(' ')[0])
      );
      if(afTeam){
        const statsData = await fetch(`/api/data?type=playerstats&teamId=${afTeam.team.id}`).then(r=>r.json());
        if(!statsData.error) renderSquadModal(squadData, statsData.response||[]);
      }
    }catch(e){ /* player stats failed — basic view stays */ }
  }catch(e){
    document.getElementById('modal-inner').innerHTML=
      `<div style="padding:20px"><div class="error-box">${e.message}</div></div>`;
  }
}

function renderSquadModal(team, afPlayers){
  // Build scorer map (goals this tournament, from STATE.scorers)
  const scorerMap={};
  STATE.scorers.forEach(sc=>{
    if(sc.team?.id===team.id) scorerMap[sc.player?.id]=sc;
  });

  // Build AF player stats map by name (best match we have without a cross-ID table)
  const afMap={};
  if(afPlayers){
    afPlayers.forEach(p=>{
      const key = p.player.name.toLowerCase();
      afMap[key] = p;
    });
  }

  const squad = team.squad||[];
  const byPos = {};
  squad.forEach(p=>{const pos=p.position||'Other';if(!byPos[pos])byPos[pos]=[];byPos[pos].push(p);});
  const orderedPos=[...POS_ORDER,...Object.keys(byPos).filter(k=>!POS_ORDER.includes(k))];

  const crestHtml = team.crest
    ? `<img class="squad-crest" src="${team.crest}" alt="" onerror="this.style.display='none'">`
    : `<span style="font-size:36px">${teamFlag(team)}</span>`;

  let posHtml='';
  orderedPos.forEach(pos=>{
    const players=byPos[pos];
    if(!players?.length)return;
    const cards=players.map(p=>{
      const fdScorer = scorerMap[p.id];
      const goals    = fdScorer?.goals||0;
      const assists  = fdScorer?.assists||0;

      // Try to match AF player by name
      const afP = afMap[p.name.toLowerCase()];
      const afS = afP?.statistics?.[0];
      const mins    = afS?.games?.minutes||0;
      const rating  = parseFloat(afS?.games?.rating||0);
      const yCards  = afS?.cards?.yellow||0;
      const rCards  = afS?.cards?.red||0;
      const shots   = afS?.shots?.total||0;
      const photo   = afP?.player?.photo||'';

      const rColor  = rating>=8?'var(--green)':rating>=7?'var(--gold)':'var(--muted)';

      const statsBadges = [
        goals   > 0 ? `<span style="background:rgba(245,200,66,.15);border:1px solid rgba(245,200,66,.3);color:var(--gold);font-size:9px;padding:1px 5px;border-radius:8px">⚽ ${goals}</span>` : '',
        assists > 0 ? `<span style="background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);color:var(--blue);font-size:9px;padding:1px 5px;border-radius:8px">🎯 ${assists}</span>` : '',
        yCards  > 0 ? `<span style="font-size:9px">🟨${yCards}</span>` : '',
        rCards  > 0 ? `<span style="font-size:9px">🟥${rCards}</span>` : '',
      ].filter(Boolean).join('');

      return`<div class="player-card">
        ${photo
          ? `<img class="player-card-photo" src="${photo}" alt="${p.name}" loading="lazy" onerror="this.outerHTML='<div class=player-card-ph id=sq-${p.id}>${teamFlag(team)}</div>'">`
          : `<div class="player-card-ph" id="sq-${p.id}">${teamFlag(team)}</div>`
        }
        <div class="player-num">#${p.shirtNumber||'?'}</div>
        <div class="player-name">${p.name}</div>
        <div class="player-pos">${p.position||''}</div>
        ${mins>0?`<div style="font-family:Barlow Condensed;font-size:9px;color:var(--muted)">${mins}' played${rating>0?` · <span style="color:${rColor}">${rating.toFixed(1)}</span>`:''}</div>`:''}
        ${statsBadges?`<div style="display:flex;gap:3px;flex-wrap:wrap;justify-content:center">${statsBadges}</div>`:''}
      </div>`;
    }).join('');
    posHtml+=`<div class="squad-pos-title">${pos}s</div><div class="squad-grid">${cards}</div>`;

    // Lazy-load wiki photos only where we don't have AF photos
    if(!afPlayers){
      players.forEach(p=>loadSquadPhoto(p.name,p.id));
    }
  });

  document.getElementById('modal-inner').innerHTML=`
    <div class="modal-hdr">
      <div style="font-family:Barlow Condensed;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold)">Squad · WC 2026 Stats</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="squad-team-hdr">
      ${crestHtml}
      <div>
        <div class="squad-team-name">${team.name}</div>
        <div class="squad-team-nat">${team.area?.name||''} · ${squad.length} players${afPlayers?' · Stats loaded':''}</div>
      </div>
    </div>
    <div class="squad-section">${posHtml||'<div class="error-box">No squad data available</div>'}</div>`;
}

async function loadSquadPhoto(name, pid){
  const url=await wikiPhoto(name);
  if(!url)return;
  const el=document.getElementById(`sq-${pid}`);
  if(el) el.outerHTML=`<img class="player-card-photo" src="${url}" alt="${name}" loading="lazy" onerror="this.style.display='none'">`;
}


/* ════════════════════════════════════════
   MODAL UTILS
════════════════════════════════════════ */
function openModalWith(html){
  document.getElementById('modal-inner').innerHTML=html;
  document.getElementById('modal-overlay').classList.remove('hidden');
  document.body.style.overflow='hidden';
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('modal-overlay'))return;
  document.getElementById('modal-overlay').classList.add('hidden');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){document.getElementById('modal-overlay').classList.add('hidden');document.body.style.overflow='';}
});

/* ════════════════════════════════════════
   TAB
════════════════════════════════════════ */
function showTab(tab,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  btn.classList.add('active');
}

/* ════════════════════════════════════════
   BOOT
════════════════════════════════════════ */
initTheme();
loadAll();
setInterval(loadAll,5*60*1000);
setInterval(()=>{
  if(!STATE.lastUpdated)return;
  const mins=Math.round((Date.now()-STATE.lastUpdated)/60000);
  if(mins>0)document.getElementById('last-updated').textContent=`Updated ${mins}m ago`;
},60000);
</script>
