function renderMatchModal(m,rich){
  const ht=teamAbbr(m.homeTeam)||tla(m.homeTeam);
  const at=teamAbbr(m.awayTeam)||tla(m.awayTeam);
  const htF=teamFlag(m.homeTeam)||FLAGS[ht]||'🏳️';
  const atF=teamFlag(m.awayTeam)||FLAGS[at]||'🏳️';
  const isLive=m.status==='IN_PLAY'||m.status==='PAUSED';
  const isFin=m.status==='FINISHED';
  const hs=m.score?.fullTime?.home,as_=m.score?.fullTime?.away;
  const grpL=m.group?m.group.replace('GROUP_','').replace('Group ','').trim():null;
  const stageMap={GROUP_STAGE:'Group Stage',ROUND_OF_32:'Round of 32',ROUND_OF_16:'Round of 16',QUARTER_FINALS:'Quarter Finals',SEMI_FINALS:'Semi Finals',FINAL:'Final','3RD_PLACE_PLAY_OFF':'3rd Place'};

  // Goal events
  const goals=m.goals||[];
  const hGoals=goals.filter(g=>g.team?.id===m.homeTeam?.id);
  const aGoals=goals.filter(g=>g.team?.id===m.awayTeam?.id);
  const fmtG=(g,away)=>`<div class="ev-item ${away?'away':''}">
    <div class="ev-min">${g.minute}'</div>
    <span class="ev-icon">${g.type==='OWN_GOAL'?'⚽OG':g.type==='PENALTY'?'⚽P':'⚽'}</span>
    <span style="font-size:12px;color:var(--text)">${g.scorer?.name||'?'}${g.assist?.name?` <span style="color:var(--text3);font-size:11px">(${g.assist.name})</span>`:''}</span>
  </div>`;
  const evHtml=goals.length?`<div class="modal-sec-title">${ICON_GOAL}Goals</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
      <div>${hGoals.map(g=>fmtG(g,false)).join('')||`<span style="color:var(--text3);font-size:11px">—</span>`}</div>
      <div>${aGoals.map(g=>fmtG(g,true)).join('')||`<span style="color:var(--text3);font-size:11px">—</span>`}</div>
    </div>`:'';

  // Rich stats from API-Football
  let statsHtml='';
  if(rich?.found&&rich.stats?.length&&rich.stats[0]?.statistics?.length){
    const hStats=rich.stats[0]?.statistics||[];
    const aStats=rich.stats[1]?.statistics||[];
    const getStat=(arr,type)=>arr.find(s=>s.type===type)?.value??'–';
    const STAT_ROWS=[['Ball Possession','Possession'],['Total Shots','Shots'],['Shots on Goal','On Target'],['Corner Kicks','Corners'],['Fouls','Fouls'],['Yellow Cards','🟨 Cards'],['Red Cards','🟥 Cards'],['Goalkeeper Saves','Saves'],['Offsides','Offsides'],['Passes accurate','Pass Acc.'],];
    const rows=STAT_ROWS.map(([apiKey,label])=>{
      const hv=getStat(hStats,apiKey),av=getStat(aStats,apiKey);
      if(hv==='–'&&av==='–')return'';
      const hNum=parseFloat(String(hv).replace('%','')),aNum=parseFloat(String(av).replace('%',''));
      const barHtml=(!isNaN(hNum)&&!isNaN(aNum)&&(hNum+aNum)>0)
        ?`<div class="stats-split-bar" style="display:flex;height:3px;border-radius:2px;overflow:hidden;margin:3px 0;background:var(--glass2)"><div class="stats-split-home" style="width:${Math.round(hNum/(hNum+aNum)*100)}%;background:var(--blue)"></div><div style="flex:1;background:var(--purple)"></div></div>`:'' ;
      return`<div class="stats-bar-row"><div class="stats-val-home">${hv}</div><div class="stats-lbl">${label}</div><div class="stats-val-away">${av}</div></div>${barHtml}`;
    }).filter(Boolean).join('');
    if(rows){
      statsHtml=`<div class="modal-sec-title">${ICON_STATS}Match Statistics</div>
        <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:4px;padding:4px 0 8px;margin-bottom:4px">

async function openSquad(fdTeamId,teamName,crestUrl){

function renderSquadModal(team,afPlayers){
  const scorerMap={};
  STATE.scorers.forEach(sc=>{if(sc.team?.id===team.id)scorerMap[sc.player?.id]=sc;});
  const afMap={};
  if(afPlayers)afPlayers.forEach(p=>{afMap[p.player.name.toLowerCase()]=p;});
  const squad=team.squad||[];
  const byPos={};
  squad.forEach(p=>{const pos=p.position||'Other';if(!byPos[pos])byPos[pos]=[];byPos[pos].push(p);});
  const orderedPos=[...POS_ORDER,...Object.keys(byPos).filter(k=>!POS_ORDER.includes(k))];
  const crestHtml=team.crest?`<img class="squad-crest" src="${team.crest}" alt="" onerror="this.style.display='none'">`:`<span style="font-size:36px">${teamFlag(team)}</span>`;
  let posHtml='';
  orderedPos.forEach(pos=>{
    const players=byPos[pos];
    if(!players?.length)return;
    const cards=players.map(p=>{
      const fdScorer=scorerMap[p.id];
      const goals=fdScorer?.goals||0,assists=fdScorer?.assists||0;
      const afP=afMap[p.name.toLowerCase()];
      const afS=afP?.statistics?.[0];
      const mins=afS?.games?.minutes||0,rating=parseFloat(afS?.games?.rating||0);
      const yCards=afS?.cards?.yellow||0,rCards=afS?.cards?.red||0;
      const photo=afP?.player?.photo||'';
      const rc=rating>=8?'var(--green)':rating>=7?'var(--gold)':'var(--text3)';
      const statsBadges=[
        goals>0?`<span style="background:rgba(245,200,66,.12);color:var(--gold);font-size:8px;font-weight:600;padding:1px 5px;border-radius:8px">⚽${goals}</span>`:'',
        assists>0?`<span style="background:rgba(59,130,246,.12);color:var(--blue);font-size:8px;font-weight:600;padding:1px 5px;border-radius:8px">🎯${assists}</span>`:'',
        yCards>0?`<span style="font-size:8px">🟨${yCards}</span>`:'',
        rCards>0?`<span style="font-size:8px">🟥${rCards}</span>`:'',
      ].filter(Boolean).join('');
      return`<div class="player-card">
        ${photo?`<img class="player-card-photo" src="${photo}" alt="${p.name}" loading="lazy" onerror="this.outerHTML='<div class=player-card-ph id=sq-${p.id}>${teamFlag(team)}</div>'">`:`<div class="player-card-ph" id="sq-${p.id}">${teamFlag(team)}</div>`}
        <div class="player-num">#${p.shirtNumber||'?'}</div>
        <div class="player-name">${p.name}</div>
        <div class="player-pos">${p.position||''}</div>
        ${mins>0?`<div style="font-size:9px;color:var(--text3)">${mins}' ${rating>0?`<span style="color:${rc}">${rating.toFixed(1)}</span>`:''}</div>`:''}
        ${statsBadges?`<div style="display:flex;gap:3px;flex-wrap:wrap;justify-content:center">${statsBadges}</div>`:''}
      </div>`;
    }).join('');
    posHtml+=`<div class="squad-pos-title">${pos}s</div><div class="squad-grid">${cards}</div>`;
    if(!afPlayers)players.forEach(p=>{wikiPhoto(p.name).then(url=>{if(!url)return;const el=document.getElementById(`sq-${p.id}`);if(el)el.outerHTML=`<img class="player-card-photo" src="${url}" alt="${p.name}" loading="lazy">`;});});
  });
  document.getElementById('modal-inner').innerHTML=`
    <div class="modal-hdr">
      <div style="font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold)">Squad${afPlayers?' · Stats Loaded':''}</div>
      <button class="modal-close" onclick="closeModal()"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" /></svg></button>
    </div>
    <div class="squad-team-hdr">${crestHtml}<div><div class="squad-team-name">${team.name}</div><div class="squad-team-nat">${team.area?.name||''} · ${squad.length} players</div></div></div>
    <div class="squad-section">${posHtml||'<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px">No squad data available</div>'}</div>`;
}

/* ════════ MODAL UTILS ════════ */
function openModalWith(html){
  document.getElementById('modal-inner').innerHTML=html;
  document.getElementById('modal-overlay').classList.remove('hidden');
  document.body.style.overflow='hidden';
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('modal-overlay'))return;
  document.getElementById('modal-overlay').classList.add('hidden');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('modal-overlay').classList.add('hidden');document.body.style.overflow='';}});

/* ════════ TEAM JOURNEY MODAL ════════ */
async function openTeamJourney(teamId,teamName,crestUrl,flagEmoji,groupLabel,rowStats){
  openModalWith(`<div class="modal-loading"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" /></svg>Loading ${teamName}…</div>`);
  try{
    const data=await fetch(`/api/data?type=teamjourney&teamId=${teamId}`).then(r=>r.json());
    if(data.error) throw new Error(data.error);
    renderTeamJourney(data, teamName, crestUrl, flagEmoji, groupLabel, rowStats);
  }catch(e){
    document.getElementById('modal-inner').innerHTML=`<div style="padding:20px"><div style="background:rgba(239,68,68,0.08);border-radius:12px;padding:16px;text-align:center;font-size:12px;color:var(--red)">${e.message}</div></div>`;
  }
}

function renderTeamJourney(data, teamName, crestUrl, flagEmoji, groupLabel, rowStats){
  const {team, matches}=data;
  // Use API-computed stats, but fall back to standings row data if zeros (ID mismatch)
  const apiStats=data.stats||{};
  const hasData=apiStats.played>0;
  const stats={
    goalsFor:    hasData ? apiStats.goalsFor    : (rowStats?.goalsFor   ?? 0),
    goalsAgainst:hasData ? apiStats.goalsAgainst: (rowStats?.goalsAgainst?? 0),
    wins:        hasData ? apiStats.wins        : (rowStats?.won        ?? 0),
    draws:       hasData ? apiStats.draws       : (rowStats?.draw       ?? 0),
    losses:      hasData ? apiStats.losses      : (rowStats?.lost       ?? 0),
    played:      hasData ? apiStats.played      : ((rowStats?.won??0)+(rowStats?.draw??0)+(rowStats?.lost??0)),
    form:        apiStats.form || [],
    points:      rowStats?.points ?? (apiStats.wins*3 + apiStats.draws),
  };
  const realCrest=team?.crest||crestUrl||'';
  const realName=team?.name||teamName;
  const area=team?.area?.name||'';



  // Form badges
  const allForm=[...stats.form];
  const remainingMatches=matches.filter(m=>m.status!=='FINISHED');
  const upcomingCount=remainingMatches.length;
  const formBadges=[...stats.form.map(f=>`<div class="form-badge ${f}">${f}</div>`),
    ...Array(upcomingCount).fill('<div class="form-badge upcoming">?</div>')
  ].join('');

  // Goal bar
  const totalGoals=stats.goalsFor+stats.goalsAgainst;
  const forPct=totalGoals>0?Math.round(stats.goalsFor/totalGoals*100):50;

  // Match rows
  const matchRows=matches.map(m=>{
    const isFin=m.status==='FINISHED';
    const isHome=m.homeTeam?.id===team?.id;
    const opponent=isHome?m.awayTeam:m.homeTeam;
    const opFlag=teamFlag(opponent)||FLAGS[teamAbbr(opponent)]||'🏳️';
    const opName=opponent?.shortName||opponent?.name||'?';
    const hs=m.score?.fullTime?.home??null;
    const as_=m.score?.fullTime?.away??null;
    const myScore=isHome?hs:as_;
    const oppScore=isHome?as_:hs;
    let result='U',scoreClass='upcoming',scoreText=catTime(m.utcDate);
    if(isFin){
      result=myScore>oppScore?'W':myScore===oppScore?'D':'L';
      scoreClass=result==='W'?'win':result==='L'?'loss':'';
      scoreText=isHome?`${hs}–${as_}`:`${as_}–${hs}`;
    }
    const grpL=m.group?m.group.replace('GROUP_','').replace('Group ','').trim():null;
    const stageMap={ROUND_OF_32:'R32',ROUND_OF_16:'R16',QUARTER_FINALS:'QF',SEMI_FINALS:'SF',FINAL:'Final','3RD_PLACE_PLAY_OFF':'3rd'};
    const matchTag=grpL?`Grp ${grpL}`:(stageMap[m.stage]||'');
    return`<div class="journey-match-item" onclick="openMatch(${m.id})">
      <div class="jm-date">${shortDate(m.utcDate).replace(',',' ')}<br><span style="font-size:8px;color:var(--text3)">${matchTag}</span></div>
      <div class="jm-result ${result}">${isFin?result:'?'}</div>
      <div class="jm-teams">
        <div class="jm-team">
          ${realCrest?`<img src="${realCrest}" alt="" style="width:16px;height:16px;object-fit:contain" onerror="this.outerHTML='<span class=jm-flag>${flagEmoji}</span>'">`:`<span class="jm-flag">${flagEmoji}</span>`}
          <span class="jm-team-name">${team?.shortName||teamName}</span>
        </div>
        <span class="jm-vs">vs</span>
        <div class="jm-team">
          ${opponent?.crest?`<img src="${opponent.crest}" alt="" style="width:16px;height:16px;object-fit:contain" onerror="this.outerHTML='<span class=jm-flag>${opFlag}</span>'">`:`<span class="jm-flag">${opFlag}</span>`}
          <span class="jm-team-name faded">${opName}</span>
        </div>
      </div>
      <div class="jm-score ${scoreClass}">${isFin?scoreText:catTime(m.utcDate)}</div>
      ${m.venue?`<div class="jm-venue">${m.venue}</div>`:''}
    </div>`;
  }).join('');

  // Top scorers for this team
  const teamScorers=STATE.scorers.filter(sc=>sc.team?.id===team?.id).sort((a,b)=>(b.goals||0)-(a.goals||0)).slice(0,5);
  const scorerRows=teamScorers.map((sc,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--text3);width:20px;text-align:center">${i+1}</div>
    <div style="flex:1;font-size:12px;font-weight:600;color:var(--text)">${sc.player?.name||'?'}</div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--gold)">${sc.goals||0}</div>
    ${sc.assists?`<div style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--blue)">${sc.assists}</div>`:''}
  </div>`).join('');

  const calIcon=`<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" /></svg>`;
  const starIcon=`<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z" /></svg>`;

  document.getElementById('modal-inner').innerHTML=`
    <div class="journey-hero">

      <div class="journey-hero-overlay">
        ${realCrest
          ?`<img class="journey-crest" src="${realCrest}" alt="${realName}" onerror="this.outerHTML='<div class=journey-crest-ph>${flagEmoji}</div>'">`
          :`<div class="journey-crest-ph">${flagEmoji}</div>`}
        <div class="journey-team-info">
          <div class="journey-team-name">${realName}</div>
          <div class="journey-team-group">${area} · ${groupLabel}</div>
        </div>
      </div>
      <div style="position:absolute;top:14px;right:14px">
        <button class="modal-close" onclick="closeModal()" style="background:rgba(0,0,0,0.4)"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" /></svg></button>
      </div>
    </div>

    <!-- Form ribbon -->
    <div class="journey-form-ribbon">
      <div class="journey-form-lbl">Form</div>
      ${formBadges||'<span style="font-size:11px;color:var(--text3)">No matches yet</span>'}
      <div style="margin-left:auto;font-size:10px;color:var(--text3)">${stats.played} played · ${upcomingCount} remaining</div>
    </div>

    <!-- Stats bar -->
    <div class="journey-stats-bar">
      <div class="jstat highlight"><div class="jstat-val">${stats.points??((stats.wins||0)*3+(stats.draws||0))}</div><div class="jstat-lbl">Points</div></div>
      <div class="jstat green"><div class="jstat-val">${stats.wins??0}</div><div class="jstat-lbl">Wins</div></div>
      <div class="jstat"><div class="jstat-val">${stats.goalsFor}</div><div class="jstat-lbl">Goals For</div></div>
      <div class="jstat red"><div class="jstat-val">${stats.goalsAgainst}</div><div class="jstat-lbl">Goals Against</div></div>
    </div>

    <!-- Goal bar -->
    ${totalGoals>0?`<div class="journey-goal-bar">
      <div style="font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3)">Goal Ratio</div>
      <div class="goal-bar-wrap">
        <div class="goal-bar-for" style="width:${forPct}%"></div>
        <div class="goal-bar-against" style="flex:1"></div>
      </div>
      <div class="goal-bar-labels"><span style="color:var(--green)">⚽ ${stats.goalsFor} scored</span><span style="color:var(--red)">${stats.goalsAgainst} conceded 🥅</span></div>
    </div>`:''}

    <!-- Match timeline -->
    <div class="journey-matches">
      <div class="journey-match-title">${calIcon}Tournament Matches</div>
      ${matchRows||'<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">No matches played yet</div>'}
    </div>

    <!-- Top scorers -->
    ${teamScorers.length?`<div style="padding:0 20px 20px">
      <div class="journey-match-title" style="margin-bottom:10px">${starIcon}Tournament Scorers</div>
      <div style="display:flex;align-items:center;gap:8px;padding:4px 0 10px;border-bottom:1px solid var(--border);font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3)"><span style="width:20px">#</span><span style="flex:1">Player</span><span style="color:var(--gold)">⚽</span><span style="color:var(--blue);margin-left:8px">🎯</span></div>
      ${scorerRows}
    </div>`:''}`;
}


function showTab(tab,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  btn.classList.add('active');
  // When switching to fixtures, ensure correct day is shown
  if(tab==='fixtures') renderFixtures(ACTIVE_CAL_DATE);
}

/* ════════ BOOT ════════ */
initTheme();
loadAll();
setInterval(loadAll, 5*60*1000); // 5min refresh — matches KO stage cache TTL
setInterval(()=>{
  if(!STATE.lastUpdated)return;
  const mins=Math.round((Date.now()-STATE.lastUpdated)/60000);
  if(mins>0)document.getElementById('last-updated').textContent=`${mins}m ago`;
},60000);
</script>
</body>
</html>
