<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════════ */
:root {
  --gold:   #F5C842;
  --gold2:  #E6A800;
  --red:    #EF4444;
  --green:  #22C55E;
  --blue:   #3B82F6;
  --purple: #8B5CF6;
  --orange: #F97316;
}
[data-theme="dark"] {
  --bg:       #070B14;
  --bg2:      #0D1321;
  --glass:    rgba(255,255,255,0.04);
  --glass2:   rgba(255,255,255,0.07);
  --glass3:   rgba(255,255,255,0.10);
  --border:   rgba(255,255,255,0.06);
  --border2:  rgba(255,255,255,0.10);
  --text:     #F1F5F9;
  --text2:    #94A3B8;
  --text3:    #475569;
  --shadow:   0 8px 32px rgba(0,0,0,0.5);
  --glow:     0 0 24px rgba(245,200,66,0.15);
}
[data-theme="light"] {
  --bg:       #F8FAFC;
  --bg2:      #EFF3F8;
  --glass:    rgba(255,255,255,0.8);
  --glass2:   rgba(255,255,255,0.9);
  --glass3:   rgba(255,255,255,1);
  --border:   rgba(0,0,0,0.06);
  --border2:  rgba(0,0,0,0.10);
  --text:     #0F172A;
  --text2:    #475569;
  --text3:    #94A3B8;
  --shadow:   0 4px 24px rgba(0,0,0,0.08);
  --glow:     0 0 24px rgba(245,200,66,0.08);
}

/* ══════════════════════════════════════
   RESET
══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ══════════════════════════════════════
   HEADER
══════════════════════════════════════ */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(7,11,20,0.85);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
}
[data-theme="light"] .header {
  background: rgba(248,250,252,0.9);
}
.header-left { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.header-logo {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: var(--glow);
}
.header-logo svg { width: 20px; height: 20px; color: #000; }
.header-title { font-size: 13px; font-weight: 700; letter-spacing: 0.04em; color: var(--text); line-height: 1.2; }
.header-title span { display: block; font-size: 10px; font-weight: 400; color: var(--text2); letter-spacing: 0.08em; text-transform: uppercase; }

.header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.icon-btn {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--glass); border: none;
  color: var(--text2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, color 0.2s;
}
.icon-btn:hover { background: var(--glass2); color: var(--text); }
.icon-btn svg { width: 18px; height: 18px; }
.live-pill {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(239,68,68,0.15);
  color: var(--red); font-size: 10px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 4px 10px; border-radius: 20px;
  border: 1px solid rgba(239,68,68,0.25);
}
.live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--red); animation: blink 1.2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* ══════════════════════════════════════
   NAV
══════════════════════════════════════ */
.nav {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex; gap: 2px;
  overflow-x: auto; scrollbar-width: none;
}
.nav::-webkit-scrollbar { display: none; }
.nav-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 14px 14px 12px;
  font-size: 12px; font-weight: 500;
  letter-spacing: 0.02em;
  color: var(--text2);
  background: none; border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
  transition: color 0.2s, border-color 0.2s;
  margin-bottom: -1px;
}
.nav-btn svg { width: 16px; height: 16px; flex-shrink: 0; transition: color 0.2s; }
.nav-btn:hover { color: var(--text); }
.nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
.nav-btn.active svg { color: var(--gold); }

/* ══════════════════════════════════════
   LAYOUT
══════════════════════════════════════ */
.content { padding: 20px; max-width: 1400px; margin: 0 auto; }
.section { display: none; }
.section.active { display: block; }

/* ══════════════════════════════════════
   GLASS CARD
══════════════════════════════════════ */
.card {
  background: var(--glass);
  border-radius: 16px;
  overflow: hidden;
  transition: transform 0.2s, background 0.2s;
}
.card-md { border-radius: 12px; }
.card:hover { background: var(--glass2); }
.card-gold { box-shadow: var(--glow); }

/* ══════════════════════════════════════
   SKELETON
══════════════════════════════════════ */
.skel {
  background: linear-gradient(90deg, var(--glass) 25%, var(--glass2) 50%, var(--glass) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 8px;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.skel-h { height: 100px; }
.loading-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }

/* ══════════════════════════════════════
   LEGEND
══════════════════════════════════════ */
.legend {
  display: flex; gap: 16px; margin-bottom: 16px;
  font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--text3); flex-wrap: wrap;
}
.legend-item { display: flex; align-items: center; gap: 5px; }
.ldot { width: 3px; height: 10px; border-radius: 2px; }
.ldot.q1 { background: var(--gold); }
.ldot.q2 { background: var(--blue); }

/* ══════════════════════════════════════
   STANDINGS GRID — 3 col
══════════════════════════════════════ */
.groups-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
.group-card { background: var(--glass); border-radius: 14px; overflow: hidden; transition: background 0.2s; }
.group-card:hover { background: var(--glass2); }
.group-card-hdr {
  padding: 11px 14px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: rgba(245,200,66,0.04);
}
.group-lbl { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.06em; color: var(--gold); }
.col-hdrs { display: flex; gap: 10px; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); }
.col-hdrs span { width: 20px; text-align: center; }

.team-row {
  display: flex; align-items: center; padding: 8px 14px;
  gap: 8px; cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  transition: background 0.15s;
}
.team-row:last-child { border-bottom: none; }
.team-row:hover { background: rgba(255,255,255,0.04); }
.team-rank { font-size: 11px; font-weight: 600; color: var(--text3); width: 14px; text-align: center; flex-shrink: 0; }
.rank-1 .team-rank { color: var(--gold); }
.rank-2 .team-rank { color: #94A3B8; }
.qbar { width: 3px; height: 26px; border-radius: 2px; flex-shrink: 0; background: rgba(255,255,255,0.08); }
.rank-1 .qbar { background: var(--gold); }
.rank-2 .qbar { background: var(--blue); }
.team-crest { width: 20px; height: 20px; object-fit: contain; flex-shrink: 0; }
.team-crest-ph { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
.team-name { flex: 1; font-size: 12px; font-weight: 500; color: var(--text); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.team-stats { display: flex; gap: 10px; flex-shrink: 0; }
.st { font-size: 11px; color: var(--text2); width: 20px; text-align: center; }
.st.pts { font-weight: 700; color: var(--text); font-size: 12px; }
.conf-badge {
  font-size: 8px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--green); background: rgba(34,197,94,0.12);
  padding: 2px 6px; border-radius: 20px; flex-shrink: 0;
}

/* ACCORDION */
.accordion { border-top: 1px solid var(--border); }
.acc-toggle {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px; cursor: pointer; user-select: none;
  transition: background 0.15s;
}
.acc-toggle:hover { background: rgba(255,255,255,0.03); }
.acc-label { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); display: flex; align-items: center; gap: 7px; }
.mpill { background: rgba(245,200,66,0.12); color: var(--gold); border-radius: 10px; padding: 1px 7px; font-size: 9px; }
.acc-chev { width: 14px; height: 14px; color: var(--text3); transition: transform 0.25s; }
.acc-chev.open { transform: rotate(180deg); }
.acc-body { display: none; }
.acc-body.open { display: block; }
.match-row {
  display: flex; align-items: center; padding: 7px 14px;
  gap: 6px; font-size: 11px; cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  transition: background 0.15s;
}
.match-row:last-child { border-bottom: none; }
.match-row:hover { background: rgba(255,255,255,0.03); }
.match-date { color: var(--text3); font-size: 9px; width: 54px; flex-shrink: 0; line-height: 1.3; }
.match-teams { flex: 1; display: flex; align-items: center; gap: 4px; }
.mtn { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text); }
.mvs { color: var(--text3); font-size: 9px; }
.mscore { font-weight: 700; font-size: 11px; color: var(--text); background: var(--glass2); padding: 2px 7px; border-radius: 6px; flex-shrink: 0; min-width: 34px; text-align: center; }
.mscore.up { color: var(--text3); font-size: 9px; }
.mst { font-size: 9px; color: var(--text3); width: 16px; text-align: right; flex-shrink: 0; }
.mst.live { color: var(--red); animation: blink 1s infinite; }

/* ══════════════════════════════════════
   GROUP MINI CARDS (bracket)
══════════════════════════════════════ */
.grp-card { margin: 2px 3px; background: var(--glass2); border-radius: 8px; padding: 6px 8px; font-family: 'Inter', sans-serif; }
.grp-card-lbl { font-size: 8px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
.grp-team { display: flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 500; padding: 2px 0; color: var(--text2); border-bottom: 1px solid rgba(255,255,255,0.04); }
.grp-team:last-child { border-bottom: none; }
.grp-pos-num { font-size: 10px; font-weight: 700; width: 10px; text-align: center; flex-shrink: 0; color: var(--text3); }
.grp-team.pos-1 .grp-pos-num { color: var(--gold); }
.grp-team.pos-2 .grp-pos-num { color: #94A3B8; }
.grp-team .gf { font-size: 11px; }
.grp-tname { flex: 1; font-size: 10px; font-weight: 500; color: var(--text); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.grp-team.pos-1 .grp-tname { color: var(--gold); }
.grp-pts { font-size: 10px; font-weight: 700; color: var(--text3); flex-shrink: 0; }
.grp-spacer { min-height: 5px; }

/* ══════════════════════════════════════
   CALENDAR STRIP
══════════════════════════════════════ */
.cal-strip {
  background: var(--glass);
  border-radius: 14px; padding: 14px 16px; margin-bottom: 16px;
}
.cal-month { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text2); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.cal-month svg { width: 14px; height: 14px; color: var(--gold); }
.cal-days { display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
.cal-days::-webkit-scrollbar { display: none; }
.cal-day {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 8px 10px; border-radius: 10px; cursor: pointer; flex-shrink: 0;
  min-width: 48px; background: transparent;
  transition: background 0.2s;
  position: relative;
}
.cal-day:hover { background: var(--glass2); }
.cal-day.active { background: var(--gold); }
.cal-day.active .cal-dow, .cal-day.active .cal-num, .cal-day.active .cal-today { color: #000 !important; }
.cal-day.active .cal-dot { background: #000 !important; }
.cal-dow { font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); }
.cal-num { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--text); line-height: 1; }
.cal-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gold); }
.cal-today { font-size: 7px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); }

/* ══════════════════════════════════════
   FIXTURES
══════════════════════════════════════ */
.fixtures-wrap { max-width: 720px; margin: 0 auto; }
.day-hdr {
  font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.08em;
  color: var(--text); padding: 10px 0 8px;
  border-bottom: 1px solid var(--border); margin-bottom: 10px;
  display: flex; align-items: baseline; gap: 10px;
}
.day-count { font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); }

.fx-card {
  background: var(--glass); border-radius: 14px;
  margin-bottom: 8px; overflow: hidden; cursor: pointer;
  transition: background 0.2s, transform 0.15s;
}
.fx-card:hover { background: var(--glass2); transform: translateY(-1px); }
.fx-card.live-card { background: rgba(239,68,68,0.06); }
.fx-card.live-card:hover { background: rgba(239,68,68,0.09); }
.fx-inner { display: flex; align-items: center; padding: 14px 18px; gap: 14px; }
.fx-time { width: 52px; flex-shrink: 0; text-align: center; }
.fx-time .tv { font-size: 15px; font-weight: 700; color: var(--text); display: block; }
.fx-time .td { font-size: 9px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); }
.fx-time .tlive { font-size: 10px; font-weight: 700; color: var(--red); animation: blink 1s infinite; letter-spacing: 0.06em; display: block; }
.fx-div { width: 1px; height: 40px; background: var(--border); flex-shrink: 0; }
.fx-teams { flex: 1; display: flex; align-items: center; gap: 12px; }
.fx-team { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
.fx-team.away { flex-direction: row-reverse; text-align: right; }
.fx-flag { font-size: 26px; flex-shrink: 0; }
.fx-name { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100px; }
.fx-abbr { font-size: 12px; font-weight: 600; color: var(--text2); display: none; }
.fx-score-box { text-align: center; flex-shrink: 0; width: 64px; }
.fx-score { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.04em; color: var(--text); line-height: 1; }
.fx-score.vs { font-size: 13px; color: var(--text3); letter-spacing: 0.06em; font-family: 'Inter', sans-serif; font-weight: 600; }
.fx-badge { font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 3px; }
.fx-badge.ft { color: var(--text3); }
.fx-badge.upcoming { color: var(--blue); }
.fx-badge.live { color: var(--red); animation: blink 1s infinite; }
.fx-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; min-width: 52px; }
.fx-gtag { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--gold); background: rgba(245,200,66,0.1); padding: 3px 8px; border-radius: 20px; }
.fx-stag { font-size: 9px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--purple); background: rgba(139,92,246,0.1); padding: 3px 7px; border-radius: 20px; }
.fx-hint { font-size: 9px; font-weight: 500; color: var(--text3); display: flex; align-items: center; gap: 3px; }
.fx-hint svg { width: 10px; height: 10px; }

/* ══════════════════════════════════════
   BRACKET
══════════════════════════════════════ */
.bracket-outer { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 16px; }
.bracket { display: flex; flex-direction: row; align-items: flex-start; min-width: 1500px; }
.b-col { display: flex; flex-direction: column; position: relative; }
.b-round-hdr {
  font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--gold); text-align: center; padding: 8px 4px;
  background: rgba(245,200,66,0.06);
  border-top: 2px solid var(--gold);
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px; white-space: nowrap;
}
.b-match {
  margin: 2px 6px; background: var(--glass); border-radius: 8px;
  overflow: hidden; transition: background 0.2s;
}
.b-match:hover { background: var(--glass2); }
.b-match.gold-card { background: rgba(245,200,66,0.06); }
.b-match.right-accent { }
.b-team {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 10px; font-size: 10px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.04em;
  border-bottom: 1px solid rgba(255,255,255,0.04); min-height: 28px;
}
.b-team:last-child { border-bottom: none; }
.b-team.conf { color: var(--text); }
.b-team.tbd { color: var(--text3); font-style: italic; font-size: 9px; }
.b-team.right-team { flex-direction: row-reverse; text-align: right; }
.b-team .bf { font-size: 12px; flex-shrink: 0; }
.b-lbl { font-size: 7px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); text-align: center; padding: 3px; background: rgba(255,255,255,0.02); border-top: 1px solid var(--border); }
.b-spacer { flex-shrink: 0; }
.b-center { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 80px; padding: 20px 4px; flex-shrink: 0; }
.b-trophy-icon { width: 64px; height: 64px; object-fit: contain; filter: drop-shadow(0 0 16px rgba(245,200,66,0.5)); animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
.b-trophy p { font-family: 'Bebas Neue', sans-serif; font-size: 11px; letter-spacing: 0.1em; color: var(--gold); margin-top: 6px; text-align: center; }
.bracket-note { font-size: 12px; color: var(--text2); margin-bottom: 14px; padding: 10px 14px; background: rgba(245,200,66,0.05); border-left: 3px solid var(--gold); border-radius: 0 8px 8px 0; line-height: 1.5; }
.bracket-note strong { color: var(--gold); }
.scroll-hint { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
.scroll-hint svg { width: 14px; height: 14px; animation: nudge 1.5s infinite; }
@keyframes nudge { 0%,100%{transform:translateX(0)} 50%{transform:translateX(4px)} }

/* ══════════════════════════════════════
   LEADERBOARD
══════════════════════════════════════ */
.lb-page-title {
  font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 0.08em;
  color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
}
.lb-page-title span { color: var(--gold); }
.lb-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 20px; }
.lb-stat-card { background: var(--glass); border-radius: 14px; padding: 16px 18px; position: relative; overflow: hidden; }
.lb-stat-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
.lb-stat-card.gc::after { background: linear-gradient(90deg, var(--gold), var(--gold2)); }
.lb-stat-card.tc::after { background: linear-gradient(90deg, var(--blue), #60A5FA); }
.lb-stat-card.ac::after { background: linear-gradient(90deg, var(--purple), #A78BFA); }
.lb-stat-lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }
.lb-stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 38px; line-height: 1; }
.gc .lb-stat-val { color: var(--gold); }
.tc .lb-stat-val { color: var(--blue); font-size: 22px; margin-top: 4px; }
.ac .lb-stat-val { color: var(--purple); }
.lb-stat-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* PODIUM */
.podium { display: flex; align-items: flex-end; justify-content: center; gap: 10px; margin-bottom: 24px; }
.podium-slot { display: flex; flex-direction: column; align-items: center; flex: 1; max-width: 180px; }
.podium-slot.p1 { order: 2; }
.podium-slot.p2 { order: 1; }
.podium-slot.p3 { order: 3; }
.podium-photo-wrap { position: relative; margin-bottom: 0; }
.podium-photo { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(255,255,255,0.1); background: var(--glass2); display: block; }
.p1 .podium-photo { width: 88px; height: 88px; border-color: var(--gold); box-shadow: 0 0 24px rgba(245,200,66,0.35); }
.p2 .podium-photo { border-color: #E5E7EB; }
.p3 .podium-photo { border-color: #CD7F32; }
.podium-ph { border-radius: 50%; background: var(--glass2); border: 3px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 28px; width: 72px; height: 72px; }
.p1 .podium-ph { width: 88px; height: 88px; border-color: var(--gold); }
.podium-rank-badge {
  font-size: 11px; font-weight: 700; width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  position: absolute; bottom: -3px; right: -3px;
}
.p1 .podium-rank-badge { background: var(--gold); color: #000; }
.p2 .podium-rank-badge { background: #E5E7EB; color: #000; }
.p3 .podium-rank-badge { background: #CD7F32; color: #fff; }
.podium-base {
  width: 100%; border-radius: 10px 10px 0 0;
  display: flex; flex-direction: column; align-items: center;
  padding: 12px 8px 10px; margin-top: 6px;
}
.p1 .podium-base { background: rgba(245,200,66,0.1); min-height: 90px; }
.p2 .podium-base { background: rgba(229,231,235,0.06); min-height: 70px; }
.p3 .podium-base { background: rgba(205,127,50,0.06); min-height: 60px; }
.podium-name { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text); text-align: center; margin-top: 4px; }
.podium-team { font-size: 10px; color: var(--text3); }
.podium-goals { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--gold); line-height: 1; margin-top: 4px; }
.p2 .podium-goals, .p3 .podium-goals { font-size: 22px; }
.podium-goals-lbl { font-size: 8px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); }

/* LB LIST */
.lb-list { background: var(--glass); border-radius: 14px; overflow: hidden; }
.lb-list-hdr { display: flex; align-items: center; padding: 8px 16px; background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border); gap: 12px; }
.lb-hdr-col { font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); }
.lb-row { display: flex; align-items: center; padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.03); gap: 12px; transition: background 0.15s; }
.lb-row:last-child { border-bottom: none; }
.lb-row:hover { background: rgba(255,255,255,0.03); }
.lb-rank { font-family: 'Bebas Neue', sans-serif; font-size: 18px; width: 26px; text-align: center; flex-shrink: 0; color: var(--text3); }
.lb-rank.r1 { color: var(--gold); }
.lb-rank.r2 { color: #E5E7EB; }
.lb-rank.r3 { color: #CD7F32; }
.lb-photo { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: var(--glass2); }
.lb-ph { width: 36px; height: 36px; border-radius: 50%; background: var(--glass2); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.lb-info { flex: 1; min-width: 0; }
.lb-pname { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.01em; }
.lb-pteam { font-size: 10px; color: var(--text3); }
.lb-g { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--gold); width: 32px; text-align: center; flex-shrink: 0; }
.lb-a { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--blue); width: 28px; text-align: center; flex-shrink: 0; }
.lb-p { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--red); width: 28px; text-align: center; flex-shrink: 0; }
.lb-years { font-size: 10px; color: var(--text3); width: 80px; text-align: right; flex-shrink: 0; }
.lb-extra { font-size: 9px; font-weight: 600; color: var(--green); background: rgba(34,197,94,0.1); padding: 2px 6px; border-radius: 10px; flex-shrink: 0; white-space: nowrap; }
.active-wc { font-size: 8px; font-weight: 600; letter-spacing: 0.06em; color: var(--green); background: rgba(34,197,94,0.12); padding: 1px 5px; border-radius: 10px; flex-shrink: 0; }

/* ══════════════════════════════════════
   MODAL
══════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
}
.modal-overlay.hidden { display: none; }
.modal {
  background: #0D1321;
  border-radius: 20px; width: 100%; max-width: 580px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 24px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.06);
}
[data-theme="light"] .modal { background: #FFFFFF; }
.modal-hdr {
  background: rgba(245,200,66,0.04);
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 2;
  backdrop-filter: blur(20px);
}
.modal-close {
  background: var(--glass); border: none; color: var(--text2);
  width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, color 0.2s;
}
.modal-close:hover { background: var(--glass2); color: var(--text); }
.modal-close svg { width: 16px; height: 16px; }
.modal-score-section { padding: 24px 20px 20px; text-align: center; border-bottom: 1px solid var(--border); }
.modal-teams-row { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 14px; }
.modal-team { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; }
.modal-team-flag { font-size: 40px; }
.modal-team-name { font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text); }
.modal-scoreline { font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: 0.06em; color: var(--text); line-height: 1; }
.modal-scoreline.live { color: var(--red); }
.modal-status { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; text-align: center; margin-top: 4px; }
.modal-match-info { font-size: 11px; color: var(--text3); display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin-top: 8px; }
.modal-body { padding: 16px 20px; }
.modal-sec-title { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
.modal-sec-title svg { width: 14px; height: 14px; color: var(--gold); }
.ev-item { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-bottom: 6px; }
.ev-item.away { flex-direction: row-reverse; }
.ev-min { background: var(--glass2); border-radius: 5px; padding: 2px 6px; font-size: 10px; font-weight: 600; color: var(--text3); flex-shrink: 0; min-width: 32px; text-align: center; }
.ev-icon { font-size: 14px; flex-shrink: 0; }
.lineup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.lp { font-size: 11px; color: var(--text); padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.04); display: flex; gap: 6px; }
.lp:last-child { border-bottom: none; }
.lnum { color: var(--text3); width: 20px; text-align: right; flex-shrink: 0; }
.modal-pw { padding: 12px; background: rgba(139,92,246,0.05); border-radius: 8px; font-size: 11px; color: var(--text3); text-align: center; margin-bottom: 12px; }
.modal-pw a { color: var(--purple); }
.modal-loading { padding: 40px; text-align: center; font-size: 12px; font-weight: 500; letter-spacing: 0.06em; color: var(--text3); display: flex; align-items: center; justify-content: center; gap: 8px; }
.modal-loading svg { width: 16px; height: 16px; color: var(--gold); animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* STATS BAR */
.stats-bar-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.stats-bar-row:last-child { border-bottom: none; }
.stats-val-home { font-size: 14px; font-weight: 700; color: var(--blue); text-align: right; }
.stats-lbl { font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); text-align: center; white-space: nowrap; padding: 0 6px; }
.stats-val-away { font-size: 14px; font-weight: 700; color: var(--purple); }
.stats-split-bar { grid-column: 1/-1; display: flex; height: 3px; border-radius: 2px; overflow: hidden; background: var(--glass2); margin: -2px 0 2px; }
.stats-split-home { background: var(--blue); }
.stats-split-away { background: var(--purple); }

/* TOP PERFORMER CARDS */
.performer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.performer-card { background: var(--glass2); border-radius: 10px; padding: 10px; display: flex; align-items: center; gap: 8px; }
.performer-photo { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: var(--glass3); flex-shrink: 0; }
.performer-info { flex: 1; min-width: 0; }
.performer-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.02em; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.performer-meta { font-size: 10px; color: var(--text3); }
.performer-rating { font-family: 'Bebas Neue', sans-serif; font-size: 20px; flex-shrink: 0; }

/* SQUAD MODAL */
.squad-team-hdr { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px; }
.squad-crest { width: 52px; height: 52px; object-fit: contain; }
.squad-team-name { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 0.04em; color: var(--text); }
.squad-team-nat { font-size: 12px; color: var(--text3); }
.squad-section { padding: 12px 20px 20px; }
.squad-pos-title { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); margin: 12px 0 8px; }
.squad-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 8px; }
.player-card { background: var(--glass2); border-radius: 10px; padding: 10px; display: flex; flex-direction: column; align-items: center; gap: 5px; text-align: center; transition: background 0.2s, transform 0.15s; }
.player-card:hover { background: var(--glass3); transform: translateY(-2px); }
.player-card-photo { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; background: var(--glass3); }
.player-card-ph { width: 52px; height: 52px; border-radius: 50%; background: var(--glass3); display: flex; align-items: center; justify-content: center; font-size: 22px; }
.player-num { font-size: 9px; font-weight: 600; color: var(--text3); letter-spacing: 0.06em; }
.player-name { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.02em; color: var(--text); line-height: 1.2; }
.player-pos { font-size: 9px; color: var(--text3); }
.player-goals-badge { background: rgba(245,200,66,0.12); color: var(--gold); font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 10px; }

/* ══════════════════════════════════════
   TEAMS PAGE
══════════════════════════════════════ */

/* Hero banner */
.teams-hero {
  position: relative; border-radius: 20px; overflow: hidden;
  height: 220px; margin-bottom: 28px;
  background: linear-gradient(135deg, #0a1628 0%, #0d1f3c 30%, #1a0a2e 60%, #0a1628 100%);
}
.teams-hero::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 30% 50%, rgba(245,200,66,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 80%, rgba(59,130,246,0.06) 0%, transparent 50%);
}
.teams-hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(7,11,20,0.7) 0%, rgba(7,11,20,0.2) 60%, rgba(7,11,20,0.6) 100%);
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 28px 32px;
}
.teams-hero-eyebrow {
  font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--gold); margin-bottom: 6px;
  display: flex; align-items: center; gap: 6px;
}
.teams-hero-eyebrow::before { content: ''; width: 20px; height: 2px; background: var(--gold); border-radius: 1px; }
.teams-hero-title {
  font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 0.04em;
  color: #fff; line-height: 1; margin-bottom: 8px;
}
.teams-hero-sub { font-size: 13px; color: rgba(255,255,255,0.6); font-weight: 400; }
.teams-hero-badge {
  position: absolute; top: 20px; right: 24px;
  background: rgba(245,200,66,0.15); backdrop-filter: blur(10px);
  border: 1px solid rgba(245,200,66,0.3); border-radius: 12px;
  padding: 8px 16px; text-align: center;
}
.teams-hero-badge .num { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--gold); line-height: 1; }
.teams-hero-badge .lbl { font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.5); }

/* Group section */
.teams-group-section { margin-bottom: 32px; }
.teams-group-hdr {
  display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
  padding-bottom: 10px; border-bottom: 1px solid var(--border);
}
.teams-group-lbl {
  font-family: 'Bebas Neue', sans-serif; font-size: 22px;
  letter-spacing: 0.06em; color: var(--gold);
}
.teams-group-meta { font-size: 11px; color: var(--text3); font-weight: 500; }
.teams-group-leader { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text2); }
.teams-group-leader img { width: 18px; height: 18px; object-fit: contain; }

/* Team cards grid */
.teams-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }

.team-card {
  background: var(--glass); border-radius: 14px; overflow: hidden;
  cursor: pointer; transition: transform 0.2s, background 0.2s;
  position: relative;
}
.team-card:hover { transform: translateY(-4px); background: var(--glass2); }
.team-card:hover .team-card-cta { opacity: 1; }

/* Flag hero area with gradient */
.team-card-hero {
  height: 110px; position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.team-card-flag-bg {
  position: absolute; inset: 0;
  opacity: 0.12; font-size: 120px; display: flex;
  align-items: center; justify-content: center;
  filter: blur(8px); transform: scale(1.2);
}
.team-card-crest {
  width: 56px; height: 56px; object-fit: contain;
  position: relative; z-index: 1;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
  transition: transform 0.2s;
}
.team-card:hover .team-card-crest { transform: scale(1.08); }
.team-card-flag-emoji {
  font-size: 44px; position: relative; z-index: 1;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
}
.team-card-rank-badge {
  position: absolute; top: 8px; left: 8px; z-index: 2;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
  border-radius: 6px; padding: 2px 7px;
  font-size: 9px; font-weight: 700; letter-spacing: 0.06em;
  color: var(--text2); display: flex; align-items: center; gap: 3px;
}
.team-card-rank-badge.r1 { color: var(--gold); background: rgba(245,200,66,0.15); }
.team-card-rank-badge.r2 { color: #94A3B8; }
.team-card-form { position: absolute; top: 8px; right: 8px; z-index: 2; display: flex; gap: 2px; }
.form-pip {
  width: 6px; height: 6px; border-radius: 50%;
}
.form-pip.W { background: var(--green); }
.form-pip.D { background: var(--gold); }
.form-pip.L { background: var(--red); }

.team-card-body { padding: 10px 12px 12px; }
.team-card-name {
  font-size: 13px; font-weight: 700; color: var(--text);
  letter-spacing: -0.01em; margin-bottom: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.team-card-stats { display: flex; gap: 10px; align-items: center; }
.team-card-stat { text-align: center; }
.team-card-stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: var(--text); line-height: 1; }
.team-card-stat-lbl { font-size: 8px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); }
.team-card-pts { margin-left: auto; text-align: right; }
.team-card-pts-val { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--gold); line-height: 1; }
.team-card-pts-lbl { font-size: 8px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); }
.team-card-cta {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(0deg, rgba(245,200,66,0.15) 0%, transparent 100%);
  padding: 6px 12px 8px;
  font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--gold); opacity: 0; transition: opacity 0.2s;
  display: flex; align-items: center; gap: 4px;
}
.team-card-cta svg { width: 10px; height: 10px; }

/* ══════════════════════════════════════
   TEAM JOURNEY MODAL
══════════════════════════════════════ */
.journey-hero {
  position: relative; height: 180px; overflow: hidden;
  background: linear-gradient(135deg, #0d1321 0%, #1a0d28 60%, #0d1321 100%);
}
.journey-hero::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 20% 80%, rgba(245,200,66,0.1) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.08) 0%, transparent 50%);
}
.journey-hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(7,11,20,0.6) 0%, rgba(7,11,20,0.2) 100%);
  padding: 20px 24px; display: flex; align-items: flex-end; gap: 16px;
}
.journey-crest { width: 64px; height: 64px; object-fit: contain; filter: drop-shadow(0 4px 16px rgba(0,0,0,0.6)); flex-shrink: 0; }
.journey-crest-ph { font-size: 52px; flex-shrink: 0; }
.journey-team-info { flex: 1; }
.journey-team-name { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 0.04em; color: #fff; line-height: 1; }
.journey-team-group { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-top: 2px; }

/* Form ribbon */
.journey-form-ribbon {
  display: flex; align-items: center; gap: 6px;
  padding: 12px 20px; background: rgba(255,255,255,0.02);
  border-bottom: 1px solid var(--border);
}
.journey-form-lbl { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-right: 6px; }
.form-badge {
  width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 800; letter-spacing: 0.04em;
}
.form-badge.W { background: rgba(34,197,94,0.2); color: var(--green); }
.form-badge.D { background: rgba(245,200,66,0.15); color: var(--gold); }
.form-badge.L { background: rgba(239,68,68,0.15); color: var(--red); }
.form-badge.upcoming { background: var(--glass2); color: var(--text3); }

/* Stats bar */
.journey-stats-bar {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 0;
  border-bottom: 1px solid var(--border);
}
.jstat {
  padding: 14px 16px; text-align: center;
  border-right: 1px solid var(--border);
}
.jstat:last-child { border-right: none; }
.jstat-val { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--text); line-height: 1; }
.jstat-lbl { font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-top: 2px; }
.jstat.highlight .jstat-val { color: var(--gold); }
.jstat.green .jstat-val { color: var(--green); }
.jstat.red .jstat-val { color: var(--red); }

/* Match timeline */
.journey-matches { padding: 16px 20px 20px; }
.journey-match-title { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.journey-match-title svg { width: 13px; height: 13px; color: var(--gold); }

.journey-match-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: pointer; transition: background 0.15s; border-radius: 8px; padding: 8px 10px;
  margin: 0 -10px;
}
.journey-match-item:last-child { border-bottom: none; }
.journey-match-item:hover { background: rgba(255,255,255,0.03); }

.jm-date { font-size: 10px; color: var(--text3); width: 60px; flex-shrink: 0; line-height: 1.3; }
.jm-result {
  width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 800; flex-shrink: 0;
}
.jm-result.W { background: rgba(34,197,94,0.15); color: var(--green); }
.jm-result.D { background: rgba(245,200,66,0.1); color: var(--gold); }
.jm-result.L { background: rgba(239,68,68,0.12); color: var(--red); }
.jm-result.U { background: var(--glass2); color: var(--text3); font-size: 8px; }

.jm-teams { flex: 1; display: flex; align-items: center; gap: 8px; }
.jm-team { display: flex; align-items: center; gap: 5px; }
.jm-flag { font-size: 16px; }
.jm-team-name { font-size: 12px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
.jm-team-name.faded { color: var(--text3); font-weight: 400; }
.jm-vs { font-size: 10px; color: var(--text3); }
.jm-score {
  font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.04em;
  color: var(--text); background: var(--glass2); padding: 3px 10px; border-radius: 6px;
  flex-shrink: 0; min-width: 50px; text-align: center;
}
.jm-score.win { color: var(--green); }
.jm-score.loss { color: var(--red); }
.jm-score.upcoming { font-size: 10px; font-weight: 600; color: var(--blue); letter-spacing: 0.04em; }
.jm-venue { font-size: 9px; color: var(--text3); flex-shrink: 0; max-width: 80px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Goal tally */
.journey-goal-bar { padding: 0 20px 16px; }
.goal-bar-wrap { display: flex; height: 6px; border-radius: 3px; overflow: hidden; background: var(--glass2); margin: 8px 0 4px; }
.goal-bar-for { background: var(--green); transition: width 0.6s ease; }
.goal-bar-against { background: var(--red); }
.goal-bar-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text3); }


.footer { text-align: center; padding: 20px; font-size: 11px; font-weight: 500; letter-spacing: 0.04em; color: var(--text3); border-top: 1px solid var(--border); margin-top: 20px; }

/* ══════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════ */
@media(max-width:1024px) {
  .groups-grid { grid-template-columns: repeat(2,1fr); }
  .lb-stats { grid-template-columns: repeat(2,1fr); }
  .loading-grid { grid-template-columns: repeat(2,1fr); }
  .teams-grid { grid-template-columns: repeat(3,1fr); }
}
@media(max-width:900px) {
  .lb-a, .lb-p, .lb-years { display: none; }
  .podium-slot { max-width: 140px; }
  .teams-grid { grid-template-columns: repeat(2,1fr); }
}
@media(max-width:640px) {
  .header { padding: 0 14px; height: 54px; }
  .header-title { display: none; }
  .nav { padding: 0 10px; }
  .nav-btn { padding: 12px 10px; font-size: 11px; }
  .content { padding: 12px; }
  .groups-grid { grid-template-columns: 1fr; }
  .lb-stats { grid-template-columns: 1fr 1fr; }
  .fx-name { font-size: 11px; max-width: 72px; }
  .fx-flag { font-size: 20px; }
  .modal-scoreline { font-size: 40px; }
  .modal-team-flag { font-size: 32px; }
  .lineup-grid { grid-template-columns: 1fr; }
  .performer-grid { grid-template-columns: 1fr; }
  .squad-grid { grid-template-columns: repeat(3,1fr); }
  .teams-grid { grid-template-columns: repeat(2,1fr); }
  .teams-hero { height: 160px; }
  .teams-hero-title { font-size: 32px; }
  .journey-stats-bar { grid-template-columns: repeat(2,1fr); }
}
@media(max-width:480px) {
  .fx-inner { padding: 12px 10px; gap: 8px; }
  .fx-time { width: 44px; }
  .fx-time .tv { font-size: 13px; }
  .fx-flag { font-size: 20px; }
  .fx-name { max-width: 60px; font-size: 11px; }
  .fx-score { font-size: 22px; }
  .fx-score-box { width: 54px; }
  .fx-gtag { font-size: 9px; padding: 2px 5px; }
  .fx-hint { display: none; }
  .fx-meta { min-width: 44px; }
}
@media(max-width:420px) {
  .header-right .live-pill { display: none; }
  .fx-name { display: none; }

  .lb-stats { grid-template-columns: 1fr; }
  .squad-grid { grid-template-columns: repeat(2,1fr); }
  .teams-grid { grid-template-columns: repeat(2,1fr); }
}
</style>

<script>
/* ════════ CONSTANTS ════════ */
const FLAGS={MEX:'🇲🇽',KOR:'🇰🇷',CZE:'🇨🇿',RSA:'🇿🇦',CAN:'🇨🇦',SUI:'🇨🇭',BIH:'🇧🇦',QAT:'🇶🇦',BRA:'🇧🇷',MAR:'🇲🇦',SCO:'🏴󠁧󠁢󠁳󠁣󠁴󠁿',HTI:'🇭🇹',USA:'🇺🇸',AUS:'🇦🇺',PAR:'🇵🇾',TUR:'🇹🇷',GER:'🇩🇪',CIV:'🇨🇮',ECU:'🇪🇨',CUW:'🇨🇼',NED:'🇳🇱',JPN:'🇯🇵',SWE:'🇸🇪',TUN:'🇹🇳',EGY:'🇪🇬',IRN:'🇮🇷',BEL:'🇧🇪',NZL:'🇳🇿',ESP:'🇪🇸',URU:'🇺🇾',CPV:'🇨🇻',KSA:'🇸🇦',FRA:'🇫🇷',NOR:'🇳🇴',SEN:'🇸🇳',IRQ:'🇮🇶',ARG:'🇦🇷',AUT:'🇦🇹',DZA:'🇩🇿',JOR:'🇯🇴',COL:'🇨🇴',COD:'🇨🇩',POR:'🇵🇹',UZB:'🇺🇿',ENG:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',GHA:'🇬🇭',PAN:'🇵🇦',CRO:'🇭🇷'};
const NAMES={MEX:'Mexico',KOR:'Korea Rep.',CZE:'Czechia',RSA:'S. Africa',CAN:'Canada',SUI:'Switzerland',BIH:'Bosnia',QAT:'Qatar',BRA:'Brazil',MAR:'Morocco',SCO:'Scotland',HTI:'Haiti',USA:'USA',AUS:'Australia',PAR:'Paraguay',TUR:'Türkiye',GER:'Germany',CIV:'Ivory Coast',ECU:'Ecuador',CUW:'Curaçao',NED:'Netherlands',JPN:'Japan',SWE:'Sweden',TUN:'Tunisia',EGY:'Egypt',IRN:'Iran',BEL:'Belgium',NZL:'New Zealand',ESP:'Spain',URU:'Uruguay',CPV:'Cape Verde',KSA:'Saudi Arabia',FRA:'France',NOR:'Norway',SEN:'Senegal',IRQ:'Iraq',ARG:'Argentina',AUT:'Austria',DZA:'Algeria',JOR:'Jordan',COL:'Colombia',COD:'Congo DR',POR:'Portugal',UZB:'Uzbekistan',ENG:'England',GHA:'Ghana',PAN:'Panama',CRO:'Croatia'};
const POS_ORDER=['Goalkeeper','Defender','Midfielder','Attacker'];

let STATE={standings:[],matches:[],scorers:[],teams:[],lastUpdated:null};
let ACTIVE_CAL_DATE=null;

/* ════════ THEME ════════ */
function initTheme(){
  const t=localStorage.getItem('wc-theme')||'dark';
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('theme-btn').innerHTML = t==='dark'
    ? `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" /></svg>`
    : `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" /></svg>`;
}
function toggleTheme(){
  const c=document.documentElement.getAttribute('data-theme');
  const n=c==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',n);
  localStorage.setItem('wc-theme',n);
  initTheme();
}

/* ════════ DATA ════════ */
async function loadAll(){
  try{
    showLoading();
    const [main,sc]=await Promise.all([
      fetch('/api/data').then(r=>r.json()),
      fetch('/api/data?type=scorers').then(r=>r.json()),
    ]);
    if(main.error) throw new Error(main.error);
    STATE.standings=main.standings||[];
    STATE.matches=main.matches||[];
    STATE.scorers=sc.scorers||[];
    STATE.teams=main.teams||[];
    STATE.lastUpdated=new Date();
    updateTs();
    renderAll();
  }catch(e){
    document.getElementById('groups-content').innerHTML=
      `<div style="background:rgba(239,68,68,0.08);border-radius:12px;padding:20px;text-align:center;font-size:12px;color:var(--red)">⚠ ${e.message}<br><br><button onclick="loadAll()" style="background:var(--glass2);border:none;color:var(--text);font-size:11px;padding:8px 16px;border-radius:8px;cursor:pointer;margin-top:8px">Retry</button></div>`;
  }
}
function showLoading(){
  document.getElementById('groups-content').innerHTML=
    `<div class="loading-grid">${Array(9).fill('<div class="skel skel-h"></div>').join('')}</div>`;
}
function updateTs(){
  if(!STATE.lastUpdated)return;
  document.getElementById('last-updated').textContent=
    STATE.lastUpdated.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('footer-txt').textContent=
    `FIFA World Cup 2026 · Updated ${STATE.lastUpdated.toLocaleString()} · football-data.org`;
}

/* ════════ HELPERS ════════ */
const tla=t=>t?.tla||t?.shortName||'';
function teamFlag(team){
  if(!team)return'🏳️';
  if(team.tla&&FLAGS[team.tla])return FLAGS[team.tla];
  if(team.shortName&&FLAGS[team.shortName])return FLAGS[team.shortName];
  const n=team.name||'';
  for(const[a,nm]of Object.entries(NAMES)){if(nm===n||n.includes(nm)||nm.includes(n.split(' ')[0]))return FLAGS[a]||'🏳️';}
  return'🏳️';
}
function teamAbbr(team){
  if(!team)return'';
  if(team.tla&&FLAGS[team.tla])return team.tla;
  const n=team.name||'';
  for(const[a,nm]of Object.entries(NAMES)){if(nm===n||n.includes(nm)||nm.includes(n.split(' ')[0]))return a;}
  return team.tla||team.shortName||'';
}
function fname(a){return NAMES[a]||a;}
function dayKey(u){return new Date(u).toLocaleDateString('en-CA',{timeZone:'Africa/Kigali'});}
function catTime(u){return new Date(u).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'Africa/Kigali'});}
function longDate(u){return new Date(u).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',timeZone:'Africa/Kigali'});}
function shortDate(u){return new Date(u).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',timeZone:'Africa/Kigali'});}

function groupsByStage(s){
  const g={};
  s.forEach(entry=>{
    if(entry.type!=='TOTAL'||!entry.group)return;
    const raw=entry.group;
    const letter=raw.replace('GROUP_','').replace('Group ','').trim();
    g[letter]=entry.table;
  });
  return g;
}
function isConfirmed(table, groupLetter){
  if(!table||!table.length) return {};
  const sorted=[...table].sort((a,b)=>b.points-a.points);

  // Count finished matches for this group from STATE.matches (more reliable than playedGames field)
  let finishedGroupMatches = 0;
  const totalGroupMatches = 6; // 4 teams, round robin = 6 matches
  if(groupLetter && STATE.matches){
    finishedGroupMatches = STATE.matches.filter(m=>{
      if(m.status !== 'FINISHED') return false;
      const grp = (m.group||'').replace('GROUP_','').replace('Group ','').trim();
      return grp === groupLetter;
    }).length;
  }

  // Group is complete if all 6 matches are finished
  const groupComplete = finishedGroupMatches >= totalGroupMatches;

  // Fallback: use points math if we can't determine from matches
  const maxPlayed = groupComplete ? 3 : Math.max(...table.map(t=>t.playedGames||0));
  const remaining = Math.max(0, 3 - maxPlayed);

  const wm = sorted.map(t=>({...t, maxPts: t.points + remaining*3}));
  const thirdMax = wm[2]?.maxPts ?? 0;

  const r = {};
  wm.forEach((t,i)=>{
    const k = teamAbbr(t.team) || tla(t.team);
    // If group complete: top 2 by points are confirmed
    // If ongoing: only confirmed if points exceed what 3rd can reach
    r[k] = groupComplete ? i < 2 : t.points > thirdMax;
  });
  return r;
}

/* ════════ STANDINGS ════════ */
function renderGroups(groups){
  const el=document.getElementById('groups-content');
  const gm={};
  STATE.matches.forEach(m=>{if(!m.group)return;const l=m.group.replace('GROUP_','').replace('Group ','').trim();if(!gm[l])gm[l]=[];gm[l].push(m);});
  const letters=Object.keys(groups).sort();
  let html=`<div class="legend"><div class="legend-item"><div class="ldot q1"></div>1st · Advances</div><div class="legend-item"><div class="ldot q2"></div>2nd · Advances</div></div><div class="groups-grid">`;
  letters.forEach(letter=>{
    const table=groups[letter];
    const conf=isConfirmed(table,letter);
    const matches=(gm[letter]||[]).sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate));
    const upcoming=matches.filter(m=>m.status!=='FINISHED').length;
    const played=matches.filter(m=>m.status==='FINISHED').length;
    const pill=upcoming>0?`${upcoming} upcoming`:`${played} played`;
    const teamRows=table.map((row,i)=>{
      const a=teamAbbr(row.team)||tla(row.team);
      const fl=teamFlag(row.team);
      const isConf=conf[a]&&i<2;
      const crest=row.team.crest?`<img class="team-crest" src="${row.team.crest}" alt="" onerror="this.outerHTML='<span class=team-crest-ph>${fl}</span>'">`:`<span class="team-crest-ph">${fl}</span>`;
      return`<div class="team-row rank-${i+1}" onclick="openSquad(${row.team.id},'${row.team.name}','${row.team.crest||''}')">
        <div class="team-rank">${i+1}</div><div class="qbar"></div>${crest}
        <div class="team-name">${row.team.shortName||row.team.name}</div>
        ${isConf?'<div class="conf-badge">✓</div>':''}
        <div class="team-stats"><span class="st">${row.won}</span><span class="st">${row.draw}</span><span class="st">${row.lost}</span><span class="st pts">${row.points}</span></div>
      </div>`;
    }).join('');
    const matchRows=matches.map(m=>{
      const ht=tla(m.homeTeam),at=tla(m.awayTeam);
      const isLive=m.status==='IN_PLAY'||m.status==='PAUSED';
      const isFin=m.status==='FINISHED';
      const score=isFin||isLive?`${m.score?.fullTime?.home??'?'}–${m.score?.fullTime?.away??'?'}`:catTime(m.utcDate);
      return`<div class="match-row" onclick="openMatch(${m.id})">
        <div class="match-date">${shortDate(m.utcDate).replace(',',' ')}</div>
        <div class="match-teams"><span class="mtn">${ht}</span><span class="mvs">vs</span><span class="mtn">${at}</span></div>
        <div class="mscore ${isFin||isLive?'':'up'}">${score}</div>
        <div class="mst ${isLive?'live':''}">${isFin?'FT':isLive?'●':''}</div>
      </div>`;
    }).join('');
    html+=`<div class="group-card">
      <div class="group-card-hdr"><div class="group-lbl">Group ${letter}</div><div class="col-hdrs"><span>W</span><span>D</span><span>L</span><span>Pts</span></div></div>
      ${teamRows}
      <div class="accordion">
        <div class="acc-toggle" onclick="toggleAcc(this)">
          <div class="acc-label">Matches <span class="mpill">${pill}</span></div>
          <svg class="acc-chev" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" /></svg>
        </div>
        <div class="acc-body">${matchRows}</div>
      </div>
    </div>`;
  });
  html+='</div>';
  el.innerHTML=html;
}
function toggleAcc(t){
  t.querySelector('.acc-chev').classList.toggle('open');
  t.nextElementSibling.classList.toggle('open');
}

/* ════════ CALENDAR + FIXTURES ════════ */
function renderCal(){
  const el=document.getElementById('cal-wrap');
  const days={};
  STATE.matches.forEach(m=>{const k=dayKey(m.utcDate);if(!days[k])days[k]=[];days[k].push(m);});
  const sorted=Object.keys(days).sort();
  if(!sorted.length){el.innerHTML='';return;}
  if(!ACTIVE_CAL_DATE){
    const todayKey=dayKey(new Date().toISOString());
    ACTIVE_CAL_DATE=days[todayKey]?todayKey:(sorted.find(k=>k>=todayKey)||sorted[0]);
  }
  const first=new Date(sorted[0]+'T12:00:00Z');
  const last=new Date(sorted[sorted.length-1]+'T12:00:00Z');
  const monthLabel=first.getMonth()===last.getMonth()
    ?first.toLocaleDateString('en-US',{month:'long',year:'numeric'})
    :`${first.toLocaleDateString('en-US',{month:'short'})} – ${last.toLocaleDateString('en-US',{month:'short',year:'numeric'})}`;
  const calIcon=`<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" /></svg>`;
  const dayEls=sorted.map(k=>{
    const d=new Date(k+'T12:00:00Z');
    const dow=d.toLocaleDateString('en-US',{weekday:'short'});
    const num=d.getDate();
    const isToday=k===dayKey(new Date().toISOString());
    const active=k===ACTIVE_CAL_DATE?'active':'';
    return`<div class="cal-day ${active} has-games" onclick="selectDay('${k}')" data-day="${k}">
      <span class="cal-dow">${dow}</span>
      <span class="cal-num">${num}</span>
      <span class="cal-dot"></span>
      ${isToday?'<span class="cal-today">Today</span>':''}
    </div>`;
  }).join('');
  el.innerHTML=`<div class="cal-strip"><div class="cal-month">${calIcon}${monthLabel}</div><div class="cal-days">${dayEls}</div></div>`;
  setTimeout(()=>{const a=el.querySelector('.cal-day.active');if(a)a.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});},100);
}

function selectDay(k){
  ACTIVE_CAL_DATE=k;
  document.querySelectorAll('.cal-day').forEach(d=>d.classList.toggle('active',d.dataset.day===k));
  renderFixtures(k);
}

      html+=`<div class="fx-card ${isLive?'live-card':''}" onclick="openMatch(${m.id})">
        <div class="fx-inner">
          <div class="fx-time">${isLive?`<span class="tlive">● Live</span>`:`<span class="tv">${catTime(m.utcDate)}</span>`}<span class="td">CAT</span></div>

            <div class="fx-score-box">${scoreHtml}</div>

  if(Object.keys(daysToShow).length===0||!Object.values(daysToShow).some(g=>g.length)){

/* ════════ BRACKET ════════ */
/* ════════ BRACKET — OFFICIAL FIFA MATCH-NUMBER STRUCTURE ════════ */
function renderBracket(groups){
  const el=document.getElementById('bracket-content');
  const S = 70;

  // Check if group stage is done
  const groupsDone = {};
  Object.keys(groups).forEach(letter => {
    const finished = STATE.matches.filter(m => {
      if(m.status !== 'FINISHED') return false;
      const grp = (m.group||'').replace('GROUP_','').replace('Group ','').trim();
      return grp === letter;
    }).length;
    groupsDone[letter] = finished >= 6;
  });
  const allGroupsDone = Object.keys(groupsDone).length >= 12 &&
    Object.values(groupsDone).filter(Boolean).length >= 12;

  // ═══ OFFICIAL FIFA MATCH NUMBERS (verified from FIFA.com / NBC / ESPN / Sky Sports) ═══
  // R32 = Matches 73-88, R16 = 89-96, QF = 97-100, SF = 101-102, 3rd = 103, Final = 104
  const R32_TEAMS = {
    73:{h:'South Africa',ha:'RSA',a:'Canada',aa:'CAN'},
    74:{h:'Germany',ha:'GER',a:'Paraguay',aa:'PAR'},
    75:{h:'Netherlands',ha:'NED',a:'Morocco',aa:'MAR'},
    76:{h:'Brazil',ha:'BRA',a:'Japan',aa:'JPN'},
    77:{h:'France',ha:'FRA',a:'Sweden',aa:'SWE'},
    78:{h:'Ivory Coast',ha:'CIV',a:'Norway',aa:'NOR'},
    79:{h:'Mexico',ha:'MEX',a:'Ecuador',aa:'ECU'},
    80:{h:'England',ha:'ENG',a:'Congo DR',aa:'COD'},
    81:{h:'USA',ha:'USA',a:'Bosnia & Herz.',aa:'BIH'},
    82:{h:'Belgium',ha:'BEL',a:'Senegal',aa:'SEN'},
    83:{h:'Portugal',ha:'POR',a:'Croatia',aa:'CRO'},
    84:{h:'Spain',ha:'ESP',a:'Austria',aa:'AUT'},
    85:{h:'Switzerland',ha:'SUI',a:'Algeria',aa:'DZA'},
    86:{h:'Argentina',ha:'ARG',a:'Cape Verde',aa:'CPV'},
    87:{h:'Colombia',ha:'COL',a:'Ghana',aa:'GHA'},
    88:{h:'Australia',ha:'AUS',a:'Egypt',aa:'EGY'},
  };
  // R16 feeders: matchNum -> [feederMatch1, feederMatch2]
  const R16_FEEDERS = {89:[74,77], 90:[73,75], 91:[76,78], 92:[79,80], 93:[83,84], 94:[81,82], 95:[86,88], 96:[85,87]};
  const QF_FEEDERS  = {97:[89,90], 98:[93,94], 99:[91,92], 100:[95,96]};
  const SF_FEEDERS  = {101:[97,98], 102:[99,100]};
  const THIRD_FEEDERS = [101,102]; // losers
  const FINAL_FEEDERS = [101,102]; // winners

  // Official bracket sides (confirmed from API debug + FIFA.com)
  // Left:  R32 → R16(89,91,90,92) → QF(97,99) → SF(101)
  // Right: R32 → R16(93,94,95,96) → QF(98,100) → SF(102)
  // Display order top→bottom matches R32 pairing structure
  const LEFT_R32  = [74,76,73,75,77,78,79,80]; // GER,BRA,RSA,NED,FRA,CIV,MEX,ENG
  const RIGHT_R32 = [83,84,81,82,86,88,85,87]; // POR,ESP,USA,BEL,ARG,AUS,SUI,COL

  // ── Get all matches from STATE indexed by stage for KO results lookup ──
  const koMatches = STATE.matches.filter(m => !m.group && m.stage && m.stage !== 'GROUP_STAGE');
  function findMatchByTeams(ha, aa) {
    return koMatches.find(m => {
      const mh = m.homeTeam?.tla||''; const ma = m.awayTeam?.tla||'';
      return (mh===ha && ma===aa) || (mh===aa && ma===ha);
    }) || null;
  }
  function findMatchByAnyTeam(tla) {
    if(!tla) return null;
    return koMatches.find(m => (m.homeTeam?.tla===tla || m.awayTeam?.tla===tla)) || null;
  }

  // Resolve winner of a team pair (by tla) using actual match result
  function resolveWinnerTla(ha, aa) {
    const m = findMatchByTeams(ha, aa);
    if(!m || m.status !== 'FINISHED') return null;
    const hs = m.score?.fullTime?.home ?? 0, as_ = m.score?.fullTime?.away ?? 0;
    const hpen = m.score?.penalties?.home, apen = m.score?.penalties?.away;
    if(hs > as_) return m.homeTeam;
    if(as_ > hs) return m.awayTeam;
    if(hpen != null) return hpen > apen ? m.homeTeam : m.awayTeam;
    return null;
  }

  // Resolve the two teams expected in an R16 match from its R32 feeders
  function resolveR16Teams(matchNum) {
    const [f1, f2] = R16_FEEDERS[matchNum] || [];
    const t1 = R32_TEAMS[f1], t2 = R32_TEAMS[f2];
    const w1 = t1 ? resolveWinnerTla(t1.ha, t1.aa) : null;
    const w2 = t2 ? resolveWinnerTla(t2.ha, t2.aa) : null;
    return { home: w1, away: w2 };
  }

  // Render a single bracket card given two team objects + optional live match
  function renderCard(homeTeam, awayTeam, apiMatch, label, isRight=false) {
    const accent = isRight ? 'right-accent' : '';
    const rt = isRight ? 'right-team' : '';

    const ht = homeTeam, at = awayTeam;
    const htTla = ht?.tla||''; const atTla = at?.tla||'';
    const htF = (htTla && FLAGS[htTla]) ? FLAGS[htTla] : (ht?.name?teamFlag(ht):'🏳️');
    const atF = (atTla && FLAGS[atTla]) ? FLAGS[atTla] : (at?.name?teamFlag(at):'🏳️');
    const htN = ht?.shortName||ht?.name||htTla||null;
    const atN = at?.shortName||at?.name||atTla||null;

    const isFin  = apiMatch?.status==='FINISHED';
    const isLive = apiMatch?.status==='IN_PLAY'||apiMatch?.status==='PAUSED';
    const hs=apiMatch?.score?.fullTime?.home, as_=apiMatch?.score?.fullTime?.away;
    const hpen=apiMatch?.score?.penalties?.home, apen=apiMatch?.score?.penalties?.away;
    const hWin=isFin&&(hs>as_||(hs===as_&&hpen>apen));
    const aWin=isFin&&(as_>hs||(as_===hs&&apen>hpen));
    const hS=hWin?' style="color:var(--green);font-weight:700"':'';
    const aS=aWin?' style="color:var(--green);font-weight:700"':'';

    let lbl;
    if(isFin||isLive){
      const pen=(hpen!=null&&apen!=null)?` (P:${hpen}–${apen})`:'';
      const ht_=apiMatch?.score?.halfTime?.home;
      lbl=`<div class="b-lbl" style="color:${isLive?'var(--red)':'var(--text2)'}">${isLive?'● ':''}${hs??0}–${as_??0}${pen}${ht_!=null?` HT:${ht_}-${apiMatch.score.halfTime.away}`:''}</div>`;
    } else if(apiMatch) {
      lbl=`<div class="b-lbl">${catTime(apiMatch.utcDate)} · ${shortDate(apiMatch.utcDate)}</div>`;
    } else {
      lbl=`<div class="b-lbl" style="color:var(--text3)">${label||'Awaiting result'}</div>`;
    }

    const brd=isLive?' style="box-shadow:0 0 0 1px var(--red)"':'';
    const clk=apiMatch?.id?`onclick="openMatch(${apiMatch.id})" style="cursor:pointer"`:'';

    const hSlot=htN?`<div class="b-team conf ${rt}"${hS}><span class="bf">${htF}</span><span>${htN}</span></div>`
                   :`<div class="b-team tbd ${rt}">TBD</div>`;
    const aSlot=atN?`<div class="b-team conf ${rt}"${aS}><span class="bf">${atF}</span><span>${atN}</span></div>`
                   :`<div class="b-team tbd ${rt}">TBD</div>`;

    return `<div class="b-match ${accent}"${brd} ${clk}>${hSlot}${aSlot}${lbl}</div>`;
  }

  // ── R32 cards (with live scores from API) ──
  function r32Card(matchNum, isRight=false) {
    const t = R32_TEAMS[matchNum];
    if(!t) return renderCard(null,null,null,'TBD',isRight);
    const apiMatch = findMatchByTeams(t.ha, t.aa);
    const home = apiMatch?.homeTeam?.tla ? apiMatch.homeTeam : {name:t.h, tla:t.ha};
    const away = apiMatch?.awayTeam?.tla ? apiMatch.awayTeam : {name:t.a, tla:t.aa};
    return renderCard(home, away, apiMatch, `M${matchNum}`, isRight);
  }

  // ── R16 cards ──
  // API confirmed R16 teams (from debug: CANvMAR, PARvFRA, BRAvNOR, MEXvENG, USAvBEL etc.)
  // We use the actual LAST_16 match from API directly — teams are populated now.
  // For slots where API team is empty (?), fall back to computed winner from R32.
  function r16Card(matchNum, isRight=false) {
    // Find the LAST_16 match for this matchNum by checking which API R16 match
    // contains teams from this slot's two R32 feeder matches
    const resolved = resolveR16Teams(matchNum);

    // First try: find by matching either resolved team in LAST_16 matches
    let apiMatch = koMatches.find(m => {
      if(m.stage !== 'LAST_16' && m.stage !== 'ROUND_OF_16') return false;
      const mh=m.homeTeam?.tla||'', ma=m.awayTeam?.tla||'';
      if(!mh && !ma) return false;
      return (resolved.home?.tla && (mh===resolved.home.tla || ma===resolved.home.tla)) ||
             (resolved.away?.tla && (mh===resolved.away.tla || ma===resolved.away.tla));
    }) || null;

    // Use API teams if available (they may be more accurate than computed)
    const apiHasTla = apiMatch?.homeTeam?.tla && apiMatch?.awayTeam?.tla;
    const home = apiHasTla ? apiMatch.homeTeam : resolved.home;
    const away = apiHasTla ? apiMatch.awayTeam : resolved.away;

    return renderCard(home, away, apiMatch, `R16 · M${matchNum}`, isRight);
  }

  // ── QF cards (resolve from R16 winners — usually empty this early) ──
  function qfCard(matchNum, isRight=false) {
    const [f1,f2] = QF_FEEDERS[matchNum]||[];
    const r1 = resolveR16Teams(f1), r2 = resolveR16Teams(f2);
    // Need R16 match results to know winner; check if R16 matches finished
    function r16Winner(mn) {
      const res = resolveR16Teams(mn);
      const apiM = koMatches.find(m=>{
        if(m.stage!=='LAST_16'&&m.stage!=='ROUND_OF_16') return false;
        const mh=m.homeTeam?.tla||'',ma=m.awayTeam?.tla||'';
        return (res.home?.tla&&(mh===res.home.tla||ma===res.home.tla))||(res.away?.tla&&(mh===res.away.tla||ma===res.away.tla));
      });
      if(!apiM||apiM.status!=='FINISHED') return null;
      const hs=apiM.score?.fullTime?.home??0, as_=apiM.score?.fullTime?.away??0;
      if(hs>as_) return apiM.homeTeam;
      if(as_>hs) return apiM.awayTeam;
      return null;
    }
    const home = r16Winner(f1), away = r16Winner(f2);
    let apiMatch = null;
    if(home?.tla||away?.tla){
      apiMatch = koMatches.find(m=>{
        if(m.stage!=='QUARTER_FINALS'&&m.stage!=='QUARTER_FINAL') return false;
        const mh=m.homeTeam?.tla||'',ma=m.awayTeam?.tla||'';
        return (home?.tla&&(mh===home.tla||ma===home.tla))||(away?.tla&&(mh===away.tla||ma===away.tla));
      })||null;
    }
    return renderCard(home, away, apiMatch, `QF · M${matchNum}`, isRight);
  }

  // ── Group mini-cards ──
  function grpCard(letter){
    const table=groups[letter]||[];
    const sorted=[...table].sort((a,b)=>b.points-a.points);
    const rows=[0,1,2].map(pos=>{
      const row=sorted[pos];
      if(!row||!row.team) return`<div class="grp-team pos-${pos+1}"><span class="grp-pos-num">${pos+1}</span><span class="gf" style="opacity:.3">❓</span><span class="grp-tname" style="opacity:.3">TBD</span><span class="grp-pts"></span></div>`;
      const fl=teamFlag(row.team);
      const nm=row.team.shortName||row.team.name||'';
      const isDone=groupsDone[letter];
      const isThirdQual = isDone && pos===2 && ['COD','SWE','ECU','GHA','BIH','PAR','SEN','DZA'].includes(teamAbbr(row.team)||tla(row.team));
      return`<div class="grp-team pos-${pos+1}">
        <span class="grp-pos-num">${pos+1}</span>
        <span class="gf">${fl}</span>
        <span class="grp-tname" style="${isThirdQual?'color:var(--green)':''}">${nm}</span>
        <span class="grp-pts" style="${isThirdQual?'color:var(--green)':''}">${row.points}pt${isThirdQual?' ✓':''}</span>
      </div>`;
    }).join('');
    return`<div class="grp-card"><div class="grp-card-lbl">Group ${letter}${groupsDone[letter]?' ✓':''}</div>${rows}</div>`;
  }

  const leftGrps=['A','B','C','D','E','F'];
  const rightGrps=['G','H','I','J','K','L'];
  let lGrpHtml='',rGrpHtml='';
  leftGrps.forEach((l,i)=>{lGrpHtml+=grpCard(l);if(i<5)lGrpHtml+=`<div class="grp-spacer" style="height:${S*0.45}px"></div>`;});
  rightGrps.forEach((l,i)=>{rGrpHtml+=grpCard(l);if(i<5)rGrpHtml+=`<div class="grp-spacer" style="height:${S*0.45}px"></div>`;});

  // ── Build R32 columns ──
  let lR32='', rR32='';
  LEFT_R32.forEach((mn,i)=>{ lR32 += r32Card(mn,false); if(i<7) lR32 += `<div class="b-spacer" style="height:4px"></div>`; });
  RIGHT_R32.forEach((mn,i)=>{ rR32 += r32Card(mn,true); if(i<7) rR32 += `<div class="b-spacer" style="height:4px"></div>`; });

  // ── Build R16 columns — order must match LEFT_R32 pairing structure ──
  // Pairs: (M79,M76)->89? NO. Use R16_FEEDERS to find which R16 matches use LEFT_R32 teams.
  // Confirmed bracket split from FIFA official structure:
  // Left R16: M89(W74,W77), M90(W73,W75), M91(W76,W78), M92(W79,W80)
  // Right R16: M93(W83,W84), M94(W81,W82), M95(W86,W88), M96(W85,W87)
  const leftR16Nums  = [90,89,91,92]; // top→bottom: CAN/MAR, PAR/FRA, BRA/NOR, MEX/ENG
  const rightR16Nums = [93,94,95,96]; // top→bottom: POR/ESP, USA/BEL, ARG/AUS, SUI/COL

  let lR16='', rR16='';
  leftR16Nums.forEach((mn,i)=>{ lR16+=r16Card(mn,false); if(i<leftR16Nums.length-1) lR16+=`<div class="b-spacer" style="height:${S*0.9}px"></div>`; });
  rightR16Nums.forEach((mn,i)=>{ rR16+=r16Card(mn,true); if(i<rightR16Nums.length-1) rR16+=`<div class="b-spacer" style="height:${S*0.9}px"></div>`; });

  // ── QF columns ──
  // QF bracket: M97=W89vW90(left), M99=W91vW92(left), M98=W93vW94(right), M100=W95vW96(right)
  const leftQFNums  = [97,99];
  const rightQFNums = [98,100];

  let lQF='', rQF='';
  leftQFNums.forEach((mn,i)=>{ lQF+=qfCard(mn,false); if(i===0) lQF+=`<div class="b-spacer" style="height:${S*2.8}px"></div>`; });
  rightQFNums.forEach((mn,i)=>{ rQF+=qfCard(mn,true); if(i===0) rQF+=`<div class="b-spacer" style="height:${S*2.8}px"></div>`; });

  const lSF = tbdMatchSimple('SF 1 · M101');
  const rSF = tbdMatchSimple('SF 2 · M102', true);
  function tbdMatchSimple(lbl, isRight=false){
    return `<div class="b-match ${isRight?'right-accent':''}"><div class="b-team tbd ${isRight?'right-team':''}">TBD</div><div class="b-team tbd ${isRight?'right-team':''}">TBD</div><div class="b-lbl">${lbl}</div></div>`;
  }

  const finalCard = `<div class="b-match gold-card"><div class="b-team tbd">Winner SF 1</div><div class="b-team tbd">Winner SF 2</div><div class="b-lbl">🏆 Final · Jul 19</div></div>`;
  const bronzeCard = `<div class="b-match"><div class="b-team tbd">Loser SF 1</div><div class="b-team tbd">Loser SF 2</div><div class="b-lbl">Bronze · Jul 18</div></div>`;

  const statusMsg = allGroupsDone
    ? `<strong style="color:var(--green)">Group stage complete</strong> — Official FIFA bracket structure applied. Click any match to view stats.`
    : `<strong style="color:var(--gold)">Group stage in progress</strong> — Confirmed qualifiers show flag & name.`;

  el.innerHTML=`
    <div class="bracket-note">${statusMsg}</div>
    <div class="scroll-hint"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" /></svg>Scroll to explore bracket</div>
    <div class="bracket-outer"><div class="bracket" style="align-items:flex-start">
      <div class="b-col" style="min-width:108px;padding-top:28px">${lGrpHtml}</div>
      <div class="b-col" style="min-width:148px;padding-top:28px"><div class="b-round-hdr">Round of 32</div>${lR32}</div>
      <div class="b-col" style="min-width:140px;padding-top:${S*0.5}px"><div class="b-round-hdr">Round of 16</div>${lR16}</div>
      <div class="b-col" style="min-width:138px;padding-top:${S*1.9}px"><div class="b-round-hdr">Quarter Finals</div>${lQF}</div>
      <div class="b-col" style="min-width:135px;padding-top:${S*4.8}px"><div class="b-round-hdr">Semi Finals</div>${lSF}</div>
      <div class="b-col" style="min-width:128px;padding-top:${S*3}px">
        <div class="b-round-hdr" style="border-top-color:#E6A800">The Final</div>
        ${finalCard}
        <div class="b-round-hdr" style="border-top-color:#22C55E;margin-top:16px">3rd Place</div>
        ${bronzeCard}
      </div>
      <div class="b-center" style="padding-top:${S*2.5}px">
        <div style="font-size:36px;filter:drop-shadow(0 0 16px rgba(245,200,66,.5))">🏆</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:0.1em;color:var(--gold);text-align:center;margin-top:4px">Champion</div>
      </div>
      <div class="b-col" style="min-width:135px;padding-top:${S*4.8}px"><div class="b-round-hdr">Semi Finals</div>${rSF}</div>
      <div class="b-col" style="min-width:138px;padding-top:${S*1.9}px"><div class="b-round-hdr">Quarter Finals</div>${rQF}</div>
      <div class="b-col" style="min-width:140px;padding-top:${S*0.5}px"><div class="b-round-hdr">Round of 16</div>${rR16}</div>
      <div class="b-col" style="min-width:148px;padding-top:28px"><div class="b-round-hdr">Round of 32</div>${rR32}</div>
      <div class="b-col" style="min-width:108px;padding-top:28px">${rGrpHtml}</div>
    </div></div>`;
}


/* ════════ WIKI PHOTO ════════ */
async function wikiPhoto(name){
  try{
    const r=await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(name)}&prop=pageimages&format=json&pithumbsize=300&origin=*`).then(r=>r.json());
    const page=Object.values(r?.query?.pages||{})[0];
    return page?.thumbnail?.source||null;
  }catch{return null;}
}

function podiumSlot(sc,rank,prefix){
  const name=sc.player?.name||sc.player||'Unknown';
  const team=sc.team?.shortName||sc.team?.name||sc.country||'';
  const natEntry=sc.player?.nationality?Object.entries(NAMES).find(([k,v])=>sc.player.nationality.includes(v)):null;
  const pFlag=natEntry?FLAGS[natEntry[0]]:(sc.flag||'🏳️');
  const goals=sc.goals;
  const cls=rank===1?'p1':rank===2?'p2':'p3';
  const id=`${prefix}-pod-${rank}`;
  setTimeout(async()=>{
    const wk=sc.wiki||sc.player?.name||name;
    const url=await wikiPhoto(wk);
    const el=document.getElementById(id);
    if(el&&url) el.outerHTML=`<img class="podium-photo" src="${url}" alt="${name}" loading="lazy" onerror="this.style.display='none'">`;
  },50+rank*200);
  return`<div class="podium-slot ${cls}">
    <div class="podium-photo-wrap"><div class="podium-ph" id="${id}">${pFlag}</div><div class="podium-rank-badge">${rank}</div></div>
    <div class="podium-base">
      <div class="podium-name">${name.split(' ').slice(-1)[0]}</div>
      <div class="podium-team">${pFlag} ${team}</div>
      <div class="podium-goals">${goals}</div>
      <div class="podium-goals-lbl">Goals</div>
    </div>
  </div>`;
}

    if(isFin||isLive){
      const date=m.utcDate?.slice(0,10)??'';
      const home=m.homeTeam?.name??'';

      try{
        const rich=await fetch(`/api/data?type=matchstats&date=${encodeURIComponent(date)}&home=${encodeURIComponent(home)}&away=${encodeURIComponent(away)}`).then(r=>r.json());
